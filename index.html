<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threat Actor Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0d14;
    --bg2:     #0f1219;
    --bg3:     #151b27;
    --bg4:     #1c2335;
    --bg5:     #232c42;

    --border:  rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.11);
    --border3: rgba(255,255,255,0.20);

    --text:    #e8edf5;
    --text2:   #8a9bb8;
    --text3:   #49597a;

    --apt:        #e8504a;
    --apt-bg:     rgba(232,80,74,0.08);
    --apt-border: rgba(232,80,74,0.22);

    --crime:        #d4a22a;
    --crime-bg:     rgba(212,162,42,0.08);
    --crime-border: rgba(212,162,42,0.22);

    --hack:        #34b369;
    --hack-bg:     rgba(52,179,105,0.08);
    --hack-border: rgba(52,179,105,0.22);

    --blue:        #5b8ef0;
    --blue-bg:     rgba(91,142,240,0.08);
    --blue-border: rgba(91,142,240,0.22);

    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
    --radius: 6px;
    --radius-lg: 8px;
    --ease: 180ms ease;
  }

  html, body {
    height: 100%;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── CANVAS BACKGROUND ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.35;
  }

  .app {
    display: grid;
    grid-template-rows: auto auto 1fr;
    height: 100vh;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: rgba(10,13,20,0.96);
    border-bottom: 1px solid var(--border2);
    padding: 0 28px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(16px);
    position: relative;
    flex-shrink: 0;
  }

  .topbar::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(91,142,240,0.25) 40%, rgba(91,142,240,0.25) 60%, transparent 100%);
  }

  .logo {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .logo-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--apt);
    animation: pulse-dot 3s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(232,80,74,0.4); }
    50%       { opacity: 0.6; box-shadow: 0 0 0 4px rgba(232,80,74,0); }
  }

  .topbar-center {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    pointer-events: none; white-space: nowrap;
  }

  .topbar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: .01em;
  }

  .topbar-sep {
    width: 1px; height: 12px;
    background: var(--border2);
    flex-shrink: 0;
  }

  .topbar-sub {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: .04em;
    font-family: var(--mono);
    text-transform: uppercase;
  }

  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }

  .topbar-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: .03em;
  }

  #utc-clock {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text2);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: var(--radius);
    letter-spacing: .08em;
    white-space: nowrap;
    min-width: 88px;
    text-align: center;
  }

  #total-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: var(--radius);
    letter-spacing: .04em;
    white-space: nowrap;
  }

  /* ── CONTROLS ── */
  .controls {
    background: rgba(10,13,20,0.92);
    border-bottom: 1px solid var(--border);
    padding: 8px 28px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .filter-group { display: flex; gap: 4px; flex-shrink: 0; }

  .filter-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .10em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all var(--ease);
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }

  .filter-btn:hover {
    border-color: var(--border2);
    color: var(--text2);
    background: var(--bg3);
  }

  .filter-btn.active-all   { border-color: var(--border3); color: var(--text);  background: var(--bg4); }
  .filter-btn.active-apt   { border-color: var(--apt-border); color: var(--apt);   background: var(--apt-bg); }
  .filter-btn.active-crime { border-color: var(--crime-border); color: var(--crime); background: var(--crime-bg); }
  .filter-btn.active-hack  { border-color: var(--hack-border); color: var(--hack);  background: var(--hack-bg); }

  .count-chip {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.05);
    color: inherit;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .ctrl-divider {
    width: 1px; height: 18px;
    background: var(--border);
    flex-shrink: 0;
    margin: 0 4px;
  }

  #sector-filter {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .07em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    outline: none;
    transition: border-color var(--ease), color var(--ease);
    appearance: none;
    flex-shrink: 0;
  }

  #sector-filter:hover { border-color: var(--border2); color: var(--text); }
  #sector-filter:focus { border-color: var(--blue-border); }

  .feed-links {
    display: flex; align-items: center; gap: 3px; flex-shrink: 0;
  }

  .feed-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .12em;
    color: var(--text3);
    text-transform: uppercase;
    margin-right: 4px;
  }

  .feed-link {
    font-family: var(--mono);
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: .06em;
    padding: 5px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    text-decoration: none;
    transition: all var(--ease);
    white-space: nowrap;
  }

  .feed-link:hover {
    border-color: var(--blue-border);
    color: var(--blue);
    background: var(--blue-bg);
  }

  .search-wrap {
    margin-left: auto;
    position: relative;
    display: flex; align-items: center;
    flex-shrink: 0;
  }

  .search-icon {
    position: absolute; left: 10px;
    color: var(--text3);
    pointer-events: none;
    font-size: 13px;
    transition: color var(--ease);
  }

  .search-wrap:focus-within .search-icon { color: var(--blue); }

  .search-wrap input {
    font-family: var(--sans);
    font-size: 12.5px;
    padding: 6px 12px 6px 30px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    width: 240px;
    outline: none;
    transition: border-color var(--ease), background var(--ease);
  }

  .search-wrap input:hover  { border-color: var(--border2); }
  .search-wrap input:focus  { border-color: var(--blue-border); background: var(--bg4); }
  .search-wrap input::placeholder { color: var(--text3); }

  /* ── MAIN ── */
  .main { display: grid; overflow: hidden; height: 100%; }

  .grid-area {
    overflow-y: auto;
    padding: 20px 28px 28px;
    height: 100%;
    min-height: 0;
  }

  .grid-area::-webkit-scrollbar { width: 4px; }
  .grid-area::-webkit-scrollbar-track { background: transparent; }
  .grid-area::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
  .grid-area::-webkit-scrollbar-thumb:hover { background: var(--bg5); }

  /* ── GRID ── */
  .actor-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  /* ── CARDS ── */
  .actor-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 2px solid transparent;
    border-radius: var(--radius-lg);
    padding: 16px 16px 14px;
    cursor: pointer;
    transition: border-color var(--ease), background var(--ease), box-shadow var(--ease), transform var(--ease);
    position: relative;
    overflow: hidden;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* Colored left border per type */
  .actor-card.apt       { border-left-color: var(--apt); }
  .actor-card.cybercrime { border-left-color: var(--crime); }
  .actor-card.hacktivist { border-left-color: var(--hack); }

  .actor-card:hover {
    background: var(--bg3);
    border-color: var(--border2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    transform: translateY(-2px);
  }

  .actor-card.apt:hover       { border-left-color: var(--apt);   border-color: var(--apt-border); }
  .actor-card.cybercrime:hover { border-left-color: var(--crime); border-color: var(--crime-border); }
  .actor-card.hacktivist:hover { border-left-color: var(--hack);  border-color: var(--hack-border); }

  .actor-card.selected {
    background: var(--bg3);
    border-color: var(--border3);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  .actor-card.apt.selected       { border-color: var(--apt-border); }
  .actor-card.cybercrime.selected { border-color: var(--crime-border); }
  .actor-card.hacktivist.selected { border-color: var(--hack-border); }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 2px;
  }

  .card-name {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -.01em;
  }

  .type-badge {
    font-family: var(--mono);
    font-size: 8.5px;
    font-weight: 500;
    letter-spacing: .09em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    flex-shrink: 0;
    white-space: nowrap;
    margin-top: 1px;
  }

  .badge-apt       { background: var(--apt-bg);   color: var(--apt);   border: 1px solid var(--apt-border); }
  .badge-cybercrime { background: var(--crime-bg); color: var(--crime); border: 1px solid var(--crime-border); }
  .badge-hacktivist { background: var(--hack-bg);  color: var(--hack);  border: 1px solid var(--hack-border); }

  .card-nation {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--text3);
    letter-spacing: .05em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 4px;
  }

  .card-targets {
    font-size: 11px;
    color: var(--text3);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-top: auto;
    letter-spacing: .01em;
  }

  /* ── PANEL OVERLAY ── */
  .panel-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 50;
    backdrop-filter: blur(2px);
  }
  .panel-overlay.open { display: block; }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    position: fixed;
    top: 0; right: 0;
    width: 660px;
    max-width: 96vw;
    height: 100vh;
    background: var(--bg2);
    border-left: 1px solid var(--border2);
    z-index: 51;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .28s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
    box-shadow: -8px 0 40px rgba(0,0,0,0.6);
  }

  .detail-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .panel-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -.02em;
    line-height: 1.2;
  }

  .close-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 6px 11px;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    transition: all var(--ease);
  }

  .close-btn:hover {
    border-color: var(--border3);
    color: var(--text);
    background: var(--bg4);
  }

  .panel-meta {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }

  .meta-pill {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    background: var(--bg3);
    border: 1px solid var(--border2);
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: .03em;
  }

  /* ── TABS ── */
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg2);
  }

  .tab-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .10em;
    text-transform: uppercase;
    padding: 12px 18px;
    background: none; border: none;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    cursor: pointer;
    transition: color var(--ease), border-color var(--ease);
    margin-bottom: -1px;
  }

  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--blue); }

  /* ── PANEL BODY ── */
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 26px 32px;
  }

  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; animation: fadeIn 160ms ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section { margin-bottom: 26px; }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .overview-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.85;
    letter-spacing: .01em;
  }

  .obj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .obj-item {
    font-size: 12px;
    color: var(--text2);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    display: flex; align-items: flex-start; gap: 8px;
    line-height: 1.45;
    transition: border-color var(--ease);
  }

  .obj-item:hover { border-color: var(--border2); }
  .obj-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  .ttp-list { display: flex; flex-direction: column; gap: 5px; }

  .ttp-item {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 9px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    transition: border-color var(--ease);
  }

  .ttp-item:hover { border-color: var(--border2); }

  .mitre-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--blue);
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
    white-space: nowrap;
    margin-top: 1px;
    letter-spacing: .03em;
    cursor: pointer;
    transition: background var(--ease), color var(--ease);
  }

  .mitre-id:hover {
    background: rgba(91,142,240,0.18);
    color: #7aaaf5;
  }

  .mitre-id.copied { color: var(--hack); border-color: var(--hack-border); background: var(--hack-bg); }

  .pill-list { display: flex; flex-wrap: wrap; gap: 5px; }

  .pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text2);
    background: var(--bg3);
    font-family: var(--mono);
    letter-spacing: .02em;
    line-height: 1.4;
    transition: border-color var(--ease);
  }

  .pill:hover { border-color: var(--border2); }

  .pill-malware { border-color: var(--apt-border);   color: var(--apt);   background: var(--apt-bg); }
  .pill-target  { border-color: var(--crime-border); color: var(--crime); background: var(--crime-bg); }
  .pill-alias   { border-color: var(--blue-border);  color: var(--blue);  background: var(--blue-bg); }
  .pill-tactic  { border-color: rgba(168,85,247,.20); color: #a87ff5; background: rgba(168,85,247,.07); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
  }
  .empty-state p { font-family: var(--mono); font-size: 11px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 1200px) { .actor-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 860px)  { .actor-grid { grid-template-columns: repeat(2, 1fr); } .detail-panel { width: 100vw; } }
  @media (max-width: 520px)  { .actor-grid { grid-template-columns: 1fr; } }

  .desktop-title { display: inline; }
  .mobile-title  { display: none; }

  @media (max-width: 768px) {
    .desktop-title { display: none; }
    .mobile-title  { display: inline; }
    .topbar { justify-content: center; }
    .topbar-center { position: static; transform: none; }
    .topbar-right, .logo { display: none; }
  }

  @media (max-width: 480px) {
    html, body { height: auto; overflow: auto; }
    .app { display: flex; flex-direction: column; height: auto; min-height: 100dvh; overflow: visible; }
    .topbar { height: auto; padding: 12px 16px; }
    .controls { flex-wrap: wrap; padding: 8px 12px; gap: 8px; }
    .filter-group { width: 100%; }
    .filter-btn { flex: 1; justify-content: center; font-size: 9px; }
    .search-wrap { margin-left: 0; width: 100%; }
    .search-wrap input { width: 100%; }
    .feed-links { display: none; }
    .ctrl-divider { display: none; }
    .main { overflow: visible; flex: 1; }
    .grid-area { padding: 12px; overflow: visible; }
    .actor-grid { gap: 8px; }
    .actor-card:hover { transform: none; }
    .detail-panel { width: 100vw; max-width: 100vw; border-left: none; border-top: 1px solid var(--border2); }
    .panel-header { padding: 16px 14px 12px; }
    .panel-body { padding: 18px 14px 28px; }
    .obj-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="app">

  <div class="topbar">
    <div class="logo">
      <div class="logo-dot"></div>
      ThreatBase
    </div>

    <div class="topbar-center">
      <span class="topbar-title desktop-title">Global Threat Intelligence Dashboard</span>
      <span class="topbar-sep desktop-title"></span>

<script>
// ── CANVAS BACKGROUND ──
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [], mouse = { x: -9999, y: -9999 };
  const NODE_COUNT = 55, MAX_DIST = 140, REPEL = 90;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initNodes() {
    nodes = [];
    for (let i = 0; i < NODE_COUNT; i++) {
      nodes.push({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - .5) * 0.28,
        vy: (Math.random() - .5) * 0.28,
        r: Math.random() * 1.2 + 0.5,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    t *= 0.001;

    nodes.forEach(n => {
      // repel from mouse
      const dx = n.x - mouse.x, dy = n.y - mouse.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < REPEL) {
        const f = (REPEL - d) / REPEL * 0.04;
        n.vx += (dx / d) * f;
        n.vy += (dy / d) * f;
      }
      // dampen & drift
      n.vx *= 0.995; n.vy *= 0.995;
      n.x += n.vx;  n.y += n.vy;
      if (n.x < 0) { n.x = 0; n.vx *= -1; }
      if (n.x > W) { n.x = W; n.vx *= -1; }
      if (n.y < 0) { n.y = 0; n.vy *= -1; }
      if (n.y > H) { n.y = H; n.vy *= -1; }
    });

    // edges
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < MAX_DIST) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(91,142,240,${(1 - d/MAX_DIST) * 0.18})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    // nodes
    nodes.forEach((n, i) => {
      const pulse = 0.5 + 0.5 * Math.sin(t * 1.2 + n.phase);
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * (0.8 + 0.4 * pulse), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(91,142,240,${0.3 + 0.3 * pulse})`;
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initNodes(); });
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  resize(); initNodes(); requestAnimationFrame(draw);
})();

  {name:"MuddyWater",type:"APT",nation:"Iran",mitre_group_id:"G0069",aliases:["Static Kitten","Seedworm","Mercury","Mango Sandstorm","TA450"],targets:["Telecoms","Government (Middle East)","Defense","Oil & gas","Education"],known_malware:["POWERSTATS","Canopy","PowGoop","SloughRAT"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Credential Access","Discovery","Collection"],mitre_techniques:["T1566.001 – Spearphishing Attachment","T1059.001 – PowerShell","T1059.006 – Python","T1078 – Valid Accounts","T1219 – Remote Access Software (Atera, ScreenConnect)","T1027 – Obfuscated Files or Information","T1056.001 – Keylogging","T1082 – System Information Discovery"],description:"Iranian MOIS-linked threat actor conducting cyber espionage and persistent intrusion operations against government, telecom, and defense organizations. Prolific user of PowerShell, Python, and legitimate remote administration tools (Atera, ScreenConnect) to blend with normal IT operations. Notable for high operational tempo with dozens of campaigns running in parallel.",objectives:["Cyber espionage","Living-off-the-land techniques","RAT tool blending","Middle East government targeting","High-tempo parallel campaigns"]},
  {name:"Salt Typhoon",type:"APT",nation:"China",mitre_group_id:"G1036",aliases:["Earth Estries","FamousSparrow","GhostEmperor","UNC2286"],targets:["US telecoms (AT&T, Verizon, T-Mobile)","Global telecom providers","Government officials","Lawful intercept systems"],known_malware:["Demodex rootkit","SparrowDoor","FamousSparrow RAT"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Collection","Exfiltration"],mitre_techniques:["T1190 – Exploit Public-Facing Application (telecom edge devices)","T1542.003 – Bootkit (Demodex rootkit)","T1040 – Network Sniffing (CALEA intercept access)","T1078 – Valid Accounts","T1070 – Indicator Removal on Host","T1114 – Email Collection","T1041 – Exfiltration Over C2","T1016 – System Network Configuration Discovery"],description:"Chinese state-linked actor responsible for one of the most significant intelligence breaches in US history — the 2024 compromise of major US telecommunications providers including AT&T, Verizon, and T-Mobile. Successfully accessed lawful intercept (CALEA) systems, enabling collection of call metadata and communications of senior US government officials. Described as the worst telecom hack in US history.",objectives:["Telecom infrastructure compromise","Lawful intercept access","CALEA system exploitation","Government official surveillance","Call metadata collection"]},
  {name:"Sandworm Team",type:"APT",nation:"Russia",mitre_group_id:"G0034",aliases:["Voodoo Bear","IRON VIKING","TeleBots","Seashell Blizzard"],targets:["Critical infrastructure","Energy sector","Ukrainian government","Olympic organizations"],known_malware:["NotPetya","BlackEnergy","Industroyer","Olympic Destroyer","Cyclops Blink"],mitre_tactics:["Initial Access","Execution","Persistence","Lateral Movement","Collection","Command and Control","Impact"],mitre_techniques:["T1566 – Spearphishing","T1059 – Command and Scripting Interpreter","T1486 – Data Encrypted for Impact","T1485 – Data Destruction","T1489 – Service Stop (ICS/SCADA targeting)","T1195 – Supply Chain Compromise","T1021.002 – SMB/Windows Admin Shares","T1561 – Disk Wipe"],description:"Russian GRU Unit 74455 and the world's most destructive cyber warfare actor. Responsible for the 2015/2016 Ukrainian power grid attacks (first confirmed cyberattacks to cause blackouts), the 2017 NotPetya wiper causing $10B+ in global damage — the most destructive cyberattack in history — and the 2018 Winter Olympics disruption. Operations transcend espionage and constitute acts of digital warfare.",objectives:["Destructive cyber operations","Critical infrastructure attacks","ICS/SCADA disruption","Cyber warfare","Wiper deployment"]},
  {name:"Turla Group",type:"APT",nation:"Russia",mitre_group_id:"G0010",aliases:["Snake","Uroburos","Waterbug","Venomous Bear","Secret Blizzard"],targets:["Ministries of foreign affairs","Military organizations","Embassies","Defense contractors"],known_malware:["Carbon","Uroburos rootkit","ComRAT","Kazuar","HyperStack"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Credential Access","Collection","Command and Control"],mitre_techniques:["T1566 – Spearphishing","T1542 – UEFI Bootkit","T1090.003 – Multi-hop Proxy (satellite link C2)","T1078 – Valid Accounts","T1056 – Input Capture (keylogging)","T1036 – Masquerading","T1070 – Indicator Removal","T1071 – Application Layer Protocol"],description:"Russian FSB-linked espionage group known for exceptional operational security and innovative C2 techniques. Has used compromised satellite internet connections for anonymous C2 and hijacked other threat actors' infrastructure. Active since the late 1990s — one of the longest-running continuously active APT groups. Exclusively targets high-value government ministries, embassies, and military organizations.",objectives:["Diplomatic espionage","Military intelligence collection","Satellite-based C2","Infrastructure hijacking","Long-term covert access"]},
  {name:"Volt Typhoon",type:"APT",nation:"China",mitre_group_id:"G1017",aliases:["Bronze Silhouette","Vanguard Panda","Dev-0391"],targets:["US critical infrastructure","Electric utilities","Water systems","Military bases (Guam)","Communications"],known_malware:["LOLBins (native OS tools)","FRP proxy tool","Impacket (lateral movement)"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Discovery","Lateral Movement","Command and Control"],mitre_techniques:["T1190 – Exploit Public-Facing Application (VPN/routers)","T1133 – External Remote Services","T1078 – Valid Accounts","T1059.003 – Windows Command Shell (LOLBins only)","T1036 – Masquerading","T1090 – Proxy (SOHO router proxy network)","T1049 – System Network Connections Discovery","T1021.001 – Remote Desktop Protocol"],description:"Chinese state-sponsored actor with a strategic focus on pre-positioning within US critical infrastructure for potential disruptive operations rather than traditional espionage. Distinguished by heavy reliance on living-off-the-land binaries (LOLBins) and routing traffic through compromised SOHO routers. The US IC assesses this as pre-positioning for potential conflict scenarios involving Taiwan.",objectives:["Critical infrastructure pre-positioning","LOLBin-based stealth","SOHO router proxy networks","Conflict-scenario preparation","Long-term covert access"]},
  {name:"Wizard Spider",type:"APT",nation:"Russia",mitre_group_id:"G0102",aliases:["GOLD BLACKBURN","DEV-0193"],targets:["Healthcare","Financial services","Government","Critical infrastructure"],known_malware:["TrickBot","BazarLoader","Anchor","Ryuk","Conti (spawned)"],mitre_tactics:["Initial Access","Execution","Persistence","Privilege Escalation","Defense Evasion","Credential Access","Lateral Movement","Impact"],mitre_techniques:["T1566.001 – Spearphishing Attachment (Emotet to TrickBot delivery chain)","T1059 – Command and Scripting Interpreter","T1547 – Boot/Logon Autostart Execution","T1003 – OS Credential Dumping","T1021.002 – SMB/Admin Shares","T1018 – Remote System Discovery","T1486 – Data Encrypted for Impact (Ryuk)","T1562.001 – Disable Security Tools"],description:"Russia-based developer/operator of TrickBot, one of the most widely distributed banking trojans turned modular malware platform. TrickBot evolved into a comprehensive toolkit delivering Ryuk and Conti ransomware. Specifically targeted US hospitals during COVID-19, prompting a joint FBI/CISA emergency warning in October 2020.",objectives:["TrickBot distribution","Ryuk ransomware delivery","Hospital targeting","Credential dumping","Modular malware platform"]},
  {name:"ALPHV / BlackCat",type:"Cybercrime",nation:"Russia",mitre_group_id:"G0139",aliases:["BlackCat","Noberus","Sphynx"],targets:["Healthcare","Critical infrastructure","Financial services","Government","Technology"],known_malware:["ALPHV/BlackCat ransomware","Exmatter","Sphynx variant"],mitre_tactics:["Initial Access","Execution","Persistence","Privilege Escalation","Defense Evasion","Discovery","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1190 – Exploit Public-Facing Application","T1078 – Valid Accounts (stolen credentials)","T1486 – Data Encrypted for Impact","T1490 – Inhibit System Recovery","T1562.001 – Disable Security Tools","T1021.001 – Remote Desktop Protocol","T1074 – Data Staged (Exmatter)","T1657 – Financial Theft (extortion)"],description:"Sophisticated RaaS operation and believed successor to DarkSide and BlackMatter. The first major ransomware group to write ransomware in Rust, enabling cross-platform attacks across Windows, Linux, and VMware ESXi. Responsible for the devastating 2024 Change Healthcare attack that disrupted US pharmacy and healthcare payment processing for weeks. FBI disrupted operations in December 2023 but the group re-emerged.",objectives:["Cross-platform RaaS","Healthcare sector disruption","Triple extortion","Rust-based malware","Critical infrastructure targeting"]},
  {name:"Black Basta",type:"Cybercrime",nation:"Russia",mitre_group_id:"G1016",aliases:["GOLD SAHARA"],targets:["Healthcare","Manufacturing","Government","Critical infrastructure"],known_malware:["Black Basta ransomware","QakBot","Cobalt Strike","Brute Ratel"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Discovery","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1566 – Phishing (QakBot delivery)","T1078 – Valid Accounts","T1484 – Domain Policy Modification","T1486 – Data Encrypted for Impact","T1490 – Inhibit System Recovery","T1562.001 – Disable Security Tools","T1021.002 – SMB/Admin Shares","T1074 – Data Staged"],description:"Ransomware operation believed to have emerged directly from Conti's dissolution in 2022, inheriting members, tooling, and access broker relationships. Rapidly claimed 500+ victims including Ascension Health and MITRE Corporation. Notable for using Microsoft Teams to impersonate IT help desks. Internal chat logs leaked in 2025 revealed Russian-nexus leadership.",objectives:["RaaS operations","Microsoft Teams social engineering","Healthcare sector targeting","Double extortion","QakBot delivery chain"]},
  {name:"Carbanak Group",type:"Cybercrime",nation:"Ukraine / Russia",mitre_group_id:"G0008",aliases:["Anunak","FIN7 (overlapping)","Carbon Spider"],targets:["Banks","ATM networks","Payment processors","Casinos"],known_malware:["Carbanak malware","Anunak RAT","Cobalt Strike"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Discovery","Collection","Lateral Movement","Impact"],mitre_techniques:["T1566.001 – Spearphishing Attachment","T1113 – Screen Capture (CCTV and operator screen recording)","T1056.001 – Keylogging","T1021 – Remote Services","T1078 – Valid Accounts","T1071 – Application Layer Protocol","T1657 – Financial Theft (ATM jackpotting)","T1070 – Indicator Removal"],description:"Pioneer of APT techniques applied to large-scale financial crime. The Carbanak campaign stole $1B+ from over 100 banks across 40 countries between 2013–2018. Used screen recording and CCTV access to learn cashier workflows, then programmed ATMs to dispense cash on command. Several members arrested in 2018.",objectives:["ATM jackpotting","Bank heist operations","CCTV workflow surveillance","Financial system manipulation","Large-scale credential theft"]},
  {name:"Cl0p",type:"Cybercrime",nation:"Ukraine / Russia",mitre_group_id:"G0080",aliases:["TA505 (related)","FIN11 (overlapping)","Lace Tempest"],targets:["Healthcare","Financial services","Government","MOVEit/GoAnywhere platform users globally"],known_malware:["Clop ransomware","DEWMODE webshell","LEMURLOOT"],mitre_tactics:["Initial Access","Defense Evasion","Collection","Exfiltration","Impact"],mitre_techniques:["T1190 – Exploit Public-Facing Application (MOVEit, GoAnywhere zero-days)","T1505.003 – Web Shell (DEWMODE/LEMURLOOT)","T1078 – Valid Accounts","T1005 – Data from Local System","T1560 – Archive Collected Data","T1048 – Exfiltration Over Alternative Protocol","T1657 – Financial Theft (extortion without encryption)","T1070 – Indicator Removal"],description:"Data theft and ransomware actor known for high-volume exploitation of zero-day vulnerabilities in managed file transfer (MFT) solutions. The 2023 MOVEit Transfer zero-day exploitation affected 2,700+ organizations and 93M+ individuals — the largest single cybercrime campaign in history by victim count. Clop often forgoes encryption entirely in favor of pure data extortion.",objectives:["MFT zero-day exploitation","Mass data exfiltration","Pure extortion (no encryption)","MOVEit/GoAnywhere targeting","High-volume victim campaigns"]},
  {name:"Conti Group",type:"Cybercrime",nation:"Russia",mitre_group_id:"G0080",aliases:["Wizard Spider (parent group)","Ryuk successor"],targets:["Healthcare","Government","Financial services","Critical infrastructure"],known_malware:["Conti ransomware","TrickBot","BazarLoader","Cobalt Strike"],mitre_tactics:["Initial Access","Execution","Persistence","Privilege Escalation","Defense Evasion","Discovery","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1566 – Spearphishing (BazarLoader delivery)","T1021.002 – SMB/Admin Shares (lateral movement)","T1003 – OS Credential Dumping","T1484 – Domain Policy Modification (GPO abuse)","T1486 – Data Encrypted for Impact","T1490 – Inhibit System Recovery","T1078 – Valid Accounts","T1562.001 – Disable Security Tools"],description:"One of the most professionally organized ransomware operations ever documented, operating like a legitimate company with HR, training programs, and dedicated teams. Internal communications leaked in 2022 following their support for Russia's Ukraine invasion, revealing a $180M annual revenue operation with 65–100 full-time employees. Conducted the devastating attack on Ireland's HSE healthcare system in 2021.",objectives:["Ransomware deployment","Double extortion","Large enterprise targeting","Healthcare sector attacks","Credential dumping"]},
  {name:"DarkSide",type:"Cybercrime",nation:"Russia",mitre_group_id:"G0139",aliases:["BlackMatter (successor)","CARBON SPIDER affiliate"],targets:["Energy/Oil & gas","Manufacturing","Financial services"],known_malware:["DarkSide ransomware","Cobalt Strike","Mimikatz"],mitre_tactics:["Initial Access","Privilege Escalation","Defense Evasion","Discovery","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1078 – Valid Accounts (compromised VPN credentials)","T1021.001 – Remote Desktop Protocol","T1484 – Domain Policy Modification","T1003 – OS Credential Dumping","T1486 – Data Encrypted for Impact","T1490 – Inhibit System Recovery","T1074 – Data Staged (double extortion)","T1562.001 – Disable Security Tools"],description:"RaaS operation best known for the May 2021 Colonial Pipeline attack that disrupted fuel supplies across the US East Coast, triggering a federal emergency declaration and fuel shortages in 17 states. The $4.4M Colonial Pipeline ransom was partially recovered by the FBI. Believed to have re-emerged as BlackMatter and later ALPHV/BlackCat.",objectives:["Critical infrastructure ransomware","RaaS affiliate operations","Double extortion","VPN credential exploitation","Energy sector targeting"]},
  {name:"Evil Corp",type:"Cybercrime",nation:"Russia",mitre_group_id:"G0119",aliases:["Indrik Spider","GOLD DRAKE"],targets:["Corporate networks","Financial services","Healthcare","Media companies"],known_malware:["Dridex","WastedLocker","Hades","Phoenix CryptoLocker","PayloadBin"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Discovery","Lateral Movement","Impact"],mitre_techniques:["T1566 – Spearphishing (SocGholish fake browser update)","T1059.001 – PowerShell","T1021.001 – RDP Lateral Movement","T1484 – Domain Policy Modification","T1078 – Valid Accounts","T1486 – Data Encrypted for Impact","T1490 – Inhibit System Recovery","T1036 – Masquerading (rebrand to evade sanctions)"],description:"Russian cybercriminal organization led by Maksim Yakubets, sanctioned by the US Treasury in 2019 with a $5M reward offered. Responsible for the Dridex banking trojan. Has repeatedly rebranded ransomware operations (WastedLocker → Hades → Phoenix CryptoLocker → PayloadBin → Macaw) in direct response to US OFAC sanctions designations. Yakubets is alleged to have direct FSB ties.",objectives:["OFAC sanctions evasion","Ransomware rebranding","Banking trojan deployment","Financial extortion","Corporate network compromise"]},
  {name:"FIN7",type:"Cybercrime",nation:"Ukraine / Russia",mitre_group_id:"G0046",aliases:["Carbon Spider","Navigator Group","ITG14","Sangria Tempest"],targets:["Restaurant chains","Hospitality","Retail POS systems","Financial services"],known_malware:["Carbanak","GRIFFON","BOOSTWRITE","Lizar"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Collection","Exfiltration"],mitre_techniques:["T1566.001 – Spearphishing Attachment (macro docs)","T1059.001 – PowerShell","T1547 – Boot/Logon Autostart Execution","T1056 – Input Capture (POS scraping)","T1113 – Screen Capture","T1571 – Non-Standard Port C2","T1036 – Masquerading","T1041 – Exfiltration Over C2"],description:"Highly professionalized financial cybercrime group that has stolen over $3B from restaurant, hospitality, and retail industries through point-of-sale malware. Created a fake cybersecurity firm (Combi Security) to recruit unwitting penetration testers. Has evolved into an initial access broker role for multiple RaaS gangs including REvil, DarkSide, and BlackCat.",objectives:["POS malware deployment","Financial theft","Initial access brokering","Social engineering","Spearphishing campaigns"]},
  {name:"Lapsus$",type:"Cybercrime",nation:"UK / Brazil / global",mitre_group_id:"G1004",aliases:["DEV-0537","Strawberry Tempest"],targets:["Technology giants","Semiconductor firms","Gaming companies","Telecoms","Government agencies"],known_malware:["Redline Stealer","Custom exfiltration tools","MFA bypass scripts"],mitre_tactics:["Initial Access","Credential Access","Persistence","Defense Evasion","Collection","Exfiltration"],mitre_techniques:["T1566.003 – Spearphishing via Service (Telegram recruitment)","T1621 – MFA Request Generation (MFA fatigue)","T1539 – Steal Web Session Cookie","T1528 – Steal Application Access Token","T1534 – Internal Spearphishing","T1556 – Modify Authentication Process","T1213 – Data from Information Repositories","T1048 – Exfiltration Over Alternative Protocol"],description:"Loosely organized extortion and data theft group composed primarily of teenagers and young adults in the UK and Brazil. Despite minimal technical sophistication, breached Microsoft, Nvidia, Samsung, Okta, Rockstar Games, T-Mobile, and Uber in 2021–2022 using social engineering, SIM swapping, and insider recruitment. The Okta breach impacted hundreds of downstream clients.",objectives:["Social engineering","SIM swapping","Insider threat recruitment","High-profile data theft","Extortion and notoriety"]},
  {name:"LockBit",type:"Cybercrime",nation:"Russia (RaaS/global)",mitre_group_id:"G0139",aliases:["LockBit 3.0","LockBit Black","ABCD ransomware"],targets:["Healthcare","Financial services","Manufacturing","Government","Critical infrastructure"],known_malware:["LockBit 2.0","LockBit 3.0/Black","LockBit Green","StealBit (exfiltration)"],mitre_tactics:["Initial Access","Execution","Persistence","Privilege Escalation","Defense Evasion","Discovery","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1190 – Exploit Public-Facing Application","T1078 – Valid Accounts (RDP brute force)","T1486 – Data Encrypted for Impact","T1489 – Service Stop (disable backups/AV)","T1490 – Inhibit System Recovery (VSS deletion)","T1083 – File and Directory Discovery","T1021.001 – Remote Desktop Protocol","T1074 – Data Staged (StealBit exfiltration)"],description:"The world's most prolific ransomware-as-a-service (RaaS) operation, accounting for more global ransomware incidents than any other group between 2022–2024. Pioneered the affiliate model at scale with a polished admin panel and automated leak site. Victims include Boeing, UK Royal Mail, Ion Trading, and ICBC. Disrupted by Operation Cronos in February 2024 but quickly re-emerged.",objectives:["Ransomware-as-a-service","Double extortion","Affiliate model scaling","Data encryption","Backup destruction"]},
  {name:"REvil",type:"Cybercrime",nation:"Russia",mitre_group_id:"G0115",aliases:["Sodinokibi","GOLD SOUTHFIELD"],targets:["Food supply chains","Technology vendors","Legal firms","Managed service providers"],known_malware:["REvil/Sodinokibi ransomware","Cobalt Strike"],mitre_tactics:["Initial Access","Execution","Defense Evasion","Discovery","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1195.002 – Supply Chain Compromise (Kaseya VSA)","T1078 – Valid Accounts","T1486 – Data Encrypted for Impact","T1490 – Inhibit System Recovery","T1083 – File and Directory Discovery","T1021 – Remote Services","T1071 – Application Layer Protocol","T1074 – Data Staged"],description:"Russian-speaking ransomware syndicate responsible for the $11M JBS Foods attack, the 2021 Kaseya VSA supply chain attack affecting 1,500+ MSP clients, and a 2020 attack on Quanta Computer targeting Apple's supply chain. Pioneered double extortion (encrypt + threaten to publish). Members arrested by Russia's FSB in January 2022.",objectives:["Double extortion","Supply chain ransomware","RaaS operations","Financial extortion","High-profile victim targeting"]},
  {name:"Scattered Spider",type:"Cybercrime",nation:"USA / UK",mitre_group_id:"G1015",aliases:["Muddled Libra","UNC3944","Octo Tempest","0ktapus"],targets:["Casinos and hospitality","Telecoms","Technology companies","BPO providers"],known_malware:["BlackCat/ALPHV (ransomware)","Raccoon Stealer"],mitre_tactics:["Initial Access","Persistence","Privilege Escalation","Defense Evasion","Credential Access","Lateral Movement","Impact"],mitre_techniques:["T1078 – Valid Accounts (stolen credentials)","T1621 – MFA Request Generation (MFA fatigue)","T1534 – Internal Spearphishing","T1539 – Steal Web Session Cookie","T1556 – Modify Authentication Process","T1199 – Trusted Relationship abuse","T1486 – Data Encrypted for Impact (ransomware)","T1531 – Account Access Removal"],description:"English-speaking cybercrime group composed largely of young Western actors (US/UK), notable for extremely sophisticated social engineering rather than custom malware. Responsible for the 2023 MGM Resorts and Caesars Entertainment attacks causing hundreds of millions in losses. Skilled at SIM swapping, help-desk impersonation, and MFA fatigue attacks.",objectives:["Financial extortion","Ransomware deployment","Credential theft","Social engineering","Data exfiltration"]},
  {name:"ShinyHunters",type:"Cybercrime",nation:"France / Morocco (suspected)",mitre_group_id:"N/A",aliases:["ShinyHunters"],targets:["Cloud storage platforms","Technology companies","Financial institutions","Telecoms","E-commerce"],known_malware:["Custom data exfiltration tools","Snowflake credential abuse","Stealer logs (purchased)"],mitre_tactics:["Reconnaissance","Initial Access","Collection","Exfiltration"],mitre_techniques:["T1078 – Valid Accounts (stolen credentials via infostealer logs)","T1530 – Data from Cloud Storage (Snowflake environments)","T1213 – Data from Information Repositories","T1048 – Exfiltration Over Alternative Protocol","T1539 – Steal Web Session Cookie","T1585 – Establish Accounts (hacker forum personas)","T1657 – Financial Theft (extortion)","T1041 – Exfiltration Over C2"],description:"One of the most prolific data theft and extortion groups ever documented, responsible for breaching hundreds of organizations via stolen credentials and cloud storage exploitation. The 2024 Snowflake campaign alone impacted 165+ organizations including Ticketmaster (560M records), AT&T (73M records), Santander Bank, and Advance Auto Parts. Members arrested in Morocco and France in 2022 but operations continued under the same brand.",objectives:["Mass cloud data exfiltration","Snowflake environment targeting","Credential log purchasing","High-volume extortion","Underground data sales"]},
  {name:"Anonymous",type:"Hacktivist",nation:"Decentralized (global)",mitre_group_id:"N/A",aliases:["LulzSec (affiliated)","AntiSec","#OpRussia"],targets:["Governments","Corporations","Law enforcement","Religious organizations","Russian state media"],known_malware:["LOIC (Low Orbit Ion Cannon)","HOIC","Various web shell tools"],mitre_tactics:["Impact","Initial Access","Collection"],mitre_techniques:["T1498 – Network Denial of Service (DDoS via LOIC/HOIC)","T1190 – Exploit Public-Facing Application","T1505.003 – Web Shell","T1059 – Command and Scripting Interpreter","T1530 – Data from Cloud Storage","T1491.002 – External Defacement","T1078 – Valid Accounts (credential leaks reused)","T1213 – Data from Information Repositories"],description:"Decentralized international hacktivist collective with no formal leadership, operating through loosely affiliated cells united by shared causes. Emerged from 4chan/IRC culture around 2003–2008 and gained global prominence with Project Chanology and Operation Payback. Launched OpRussia after the 2022 Ukraine invasion. Capabilities vary widely — from unsophisticated DDoS to targeted data breaches.",objectives:["DDoS campaigns","Political activism","Website defacement","Data leaks","Awareness operations"]},

actors.sort((a, b) => a.name.localeCompare(b.name));

let currentFilter = 'all';
let selectedIdx = null;

function getBadgeClass(type) {
  return type === 'APT' ? 'badge-apt' : type === 'Cybercrime' ? 'badge-cybercrime' : 'badge-hacktivist';
}
function getCardClass(type) {
  return type === 'APT' ? 'apt' : type === 'Cybercrime' ? 'cybercrime' : 'hacktivist';
}

function getNationFlag(nation) {
  const codes = { china:'cn', russia:'ru', iran:'ir', 'north korea':'kp', usa:'us', pakistan:'pk', india:'in', vietnam:'vn', 'south korea':'kr', belarus:'by', nigeria:'ng', ukraine:'ua', turkey:'tr', sudan:'sd', venezuela:'ve', malaysia:'my', uk:'gb', brazil:'br', finland:'fi', israel:'il' };
  return nation.split(/\s*[\/,&+]\s*/).map(part => {
    const k = part.toLowerCase().replace(/\(.*?\)/g,'').replace(/suspected|attributed|disputed|opposition|decentralized|global|western|claimed|eastern europe|south asia|various|unknown|raas|adjacent|linked/gi,'').trim();
    const code = codes[k];
    return code ? `<img src="https://flagcdn.com/20x15/${code}.png" width="20" height="15" alt="" style="border-radius:2px;vertical-align:middle;margin-left:3px;box-shadow:0 1px 2px rgba(0,0,0,0.5);opacity:.85;">` : '';
  }).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  if (f === 'all') btn.className = 'filter-btn active-all';
  else if (f === 'APT') btn.className = 'filter-btn active-apt';
  else if (f === 'Cybercrime') btn.className = 'filter-btn active-crime';
  else btn.className = 'filter-btn active-hack';
  renderGrid();
}

function updateCounts() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const sector = document.getElementById('sector-filter').value.toLowerCase();
  const matches = a => {
    if (q && !a.name.toLowerCase().includes(q) && !a.nation.toLowerCase().includes(q) && !(a.aliases||[]).some(al => al.toLowerCase().includes(q))) return false;
    if (sector && !(a.targets||[]).some(t => t.toLowerCase().includes(sector))) return false;
    return true;
  };
  const all = actors.filter(matches);
  document.getElementById('cnt-all').textContent   = all.length;
  document.getElementById('cnt-apt').textContent   = actors.filter(a => a.type==='APT' && matches(a)).length;
  document.getElementById('cnt-crime').textContent = actors.filter(a => a.type==='Cybercrime' && matches(a)).length;
  document.getElementById('cnt-hack').textContent  = actors.filter(a => a.type==='Hacktivist' && matches(a)).length;
  document.getElementById('total-badge').textContent = all.length + ' actors';
}

function renderGrid() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const sector = document.getElementById('sector-filter').value.toLowerCase();
  const grid = document.getElementById('actor-grid');
  const filtered = actors.filter(a => {
    if (currentFilter !== 'all' && a.type !== currentFilter) return false;
    if (q && !a.name.toLowerCase().includes(q) && !a.nation.toLowerCase().includes(q) && !(a.aliases||[]).some(al => al.toLowerCase().includes(q))) return false;
    if (sector && !(a.targets||[]).some(t => t.toLowerCase().includes(sector))) return false;
    return true;
  });
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><p>No actors match the current filters.</p></div>';
  } else {
    grid.innerHTML = filtered.map(a => {
      const idx = actors.indexOf(a);
      return `<div class="actor-card ${getCardClass(a.type)}${selectedIdx===idx?' selected':''}" onclick="openActor(${idx})" onkeydown="if(event.key==='Enter'||event.key===' ')openActor(${idx})" tabindex="0" role="button" aria-label="View ${a.name}">
        <div class="card-head">
          <div class="card-name">${a.name}</div>
          <span class="type-badge ${getBadgeClass(a.type)}">${a.type}</span>
        </div>
        <div class="card-nation">${a.nation}${getNationFlag(a.nation)}${a.mitre_group_id && a.mitre_group_id !== 'N/A' ? ` <a href="https://attack.mitre.org/groups/${a.mitre_group_id}/" target="_blank" rel="noopener" style="margin-left:6px;font-size:8.5px;color:var(--blue);border:1px solid var(--blue-border);padding:1px 5px;border-radius:3px;text-decoration:none;font-family:var(--mono);letter-spacing:.04em;opacity:.8;" onclick="event.stopPropagation()">MITRE ↗</a>` : ''}</div>
        <div class="card-targets">${(a.targets||[]).slice(0,3).join(' · ')}</div>
      </div>`;
    }).join('');
  }
  updateCounts();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

function copyMitreId(el, id) {
  navigator.clipboard.writeText(id).then(() => {
    el.classList.add('copied');
    el.textContent = '✓ copied';
    setTimeout(() => { el.classList.remove('copied'); el.textContent = id; }, 1500);
  });
}

function openActor(idx) {
  const a = actors[idx];
  selectedIdx = idx;
  document.getElementById('panel-name').textContent = a.name;
  document.getElementById('panel-meta').innerHTML = `
    <span class="type-badge ${getBadgeClass(a.type)}">${a.type}</span>
    <span class="meta-pill">${a.nation}${getNationFlag(a.nation)}</span>
    ${a.mitre_group_id && a.mitre_group_id !== 'N/A' ? `<span class="meta-pill" style="font-family:var(--mono);font-size:10px;">${a.mitre_group_id}</span>` : ''}
  `;

  const objIcons = {'Financial theft':'💰','Crypto':'₿','Espionage':'🔍','Intelligence':'🔭','Credential':'🔑','Ransomware':'🔒','DDoS':'⚡','Supply chain':'🔗','Destructive':'💥','default':'🎯'};
  const getIcon = o => { for (const k in objIcons) { if (o.toLowerCase().includes(k.toLowerCase())) return objIcons[k]; } return objIcons['default']; };

  document.getElementById('panel-body').innerHTML = `
    <div id="tab-overview" class="tab-pane active">
      <div class="section">
        <div class="section-label">Brief</div>
        <p class="overview-text">${a.description}</p>
      </div>
      <div class="section">
        <div class="section-label">Objectives</div>
        <div class="obj-grid">${(a.objectives||[]).map(o=>`<div class="obj-item"><span class="obj-icon">${getIcon(o)}</span>${o}</div>`).join('')}</div>
      </div>
      <div class="section">
        <div class="section-label">Aliases</div>
        <div class="pill-list">${(a.aliases||[]).map(al=>`<span class="pill pill-alias">${al}</span>`).join('')}</div>
      </div>
    </div>
    <div id="tab-ttps" class="tab-pane">
      <div class="section">
        <div class="section-label">Tactics</div>
        <div class="pill-list">${(a.mitre_tactics||[]).map(t=>`<span class="pill pill-tactic">${t}</span>`).join('')}</div>
      </div>
      <div class="section">
        <div class="section-label">Techniques — click any T-code to copy</div>
        <div class="ttp-list">${(a.mitre_techniques||[]).map(t => {
          const m = t.match(/^(T[\d.]+)\s*[–-]\s*(.*)/);
          if (m) return `<div class="ttp-item"><span class="mitre-id" onclick="copyMitreId(this,'${m[1]}')" title="Click to copy">${m[1]}</span><span>${m[2]}</span></div>`;
          return `<div class="ttp-item"><span>${t}</span></div>`;
        }).join('')}</div>
      </div>
    </div>
    <div id="tab-malware" class="tab-pane">
      <div class="section">
        <div class="section-label">Known malware &amp; tooling</div>
        <div class="pill-list">${(a.known_malware||[]).map(m=>`<span class="pill pill-malware">${m}</span>`).join('')}</div>
      </div>
    </div>
    <div id="tab-targeting" class="tab-pane">
      <div class="section">
        <div class="section-label">Target sectors &amp; regions</div>
        <div class="pill-list">${(a.targets||[]).map(t=>`<span class="pill pill-target">${t}</span>`).join('')}</div>
      </div>
    </div>
  `;

  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  renderGrid();
}

function closePanel() {
  selectedIdx = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  renderGrid();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// UTC clock
(function() {
  function pad(n) { return String(n).padStart(2,'0'); }
  function tick() {
    const now = new Date();
    const el = document.getElementById('utc-clock');
    if (el) el.textContent = 'UTC ' + pad(now.getUTCHours()) + ':' + pad(now.getUTCMinutes()) + ':' + pad(now.getUTCSeconds());
  }
  tick(); setInterval(tick, 1000);
})();

renderGrid();
</script>
</body>
</html>
