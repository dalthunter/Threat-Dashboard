<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threat Actor Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --bg2: #111418;
    --bg3: #181c22;
    --bg4: #1e242c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8ecf0;
    --text2: #8a95a0;
    --text3: #4a5560;
    --accent-apt: #e8453c;
    --accent-apt-bg: rgba(232,69,60,0.1);
    --accent-apt-border: rgba(232,69,60,0.25);
    --accent-crime: #f59e0b;
    --accent-crime-bg: rgba(245,158,11,0.1);
    --accent-crime-border: rgba(245,158,11,0.25);
    --accent-hack: #22c55e;
    --accent-hack-bg: rgba(34,197,94,0.1);
    --accent-hack-border: rgba(34,197,94,0.25);
    --accent-blue: #3b82f6;
    --accent-blue-bg: rgba(59,130,246,0.1);
    --accent-blue-border: rgba(59,130,246,0.25);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .app { display: grid; grid-template-rows: auto auto 1fr; height: 100vh; overflow: hidden; }

  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .logo-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-apt);
    box-shadow: 0 0 8px var(--accent-apt);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .topbar-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -.01em;
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .total-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 4px;
  }

  /* ── Controls ── */
  .controls {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-group { display: flex; gap: 4px; }

  .filter-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text2); background: var(--bg3); }
  .filter-btn.active-all { border-color: var(--border2); color: var(--text); background: var(--bg3); }
  .filter-btn.active-apt { border-color: var(--accent-apt-border); color: var(--accent-apt); background: var(--accent-apt-bg); }
  .filter-btn.active-crime { border-color: var(--accent-crime-border); color: var(--accent-crime); background: var(--accent-crime-bg); }
  .filter-btn.active-hack { border-color: var(--accent-hack-border); color: var(--accent-hack); background: var(--accent-hack-bg); }

  .count-chip {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    color: inherit;
  }

  .search-wrap {
    margin-left: auto;
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    color: var(--text3);
    pointer-events: none;
    font-size: 13px;
  }

  .search-wrap input {
    font-family: var(--sans);
    font-size: 13px;
    padding: 6px 12px 6px 30px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    width: 240px;
    outline: none;
    transition: border-color .15s;
  }

  .search-wrap input:focus { border-color: var(--accent-blue-border); }
  .search-wrap input::placeholder { color: var(--text3); }

  /* ── Main content ── */
  .main { display: grid; grid-template-columns: 1fr; overflow: hidden; position: relative; }

  .grid-area {
    overflow-y: auto;
    padding: 20px 24px;
  }

  .actor-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  /* ── Actor cards ── */
  .actor-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    position: relative;
    overflow: hidden;
  }

  .actor-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity .2s;
  }

  .actor-card.apt::before { background: var(--accent-apt); }
  .actor-card.cybercrime::before { background: var(--accent-crime); }
  .actor-card.hacktivist::before { background: var(--accent-hack); }

  .actor-card:hover { border-color: var(--border2); background: var(--bg3); transform: translateY(-1px); }
  .actor-card:hover::before, .actor-card.selected::before { opacity: 1; }
  .actor-card.selected { border-color: var(--border2); background: var(--bg3); }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .type-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .badge-apt { background: var(--accent-apt-bg); color: var(--accent-apt); border: 1px solid var(--accent-apt-border); }
  .badge-cybercrime { background: var(--accent-crime-bg); color: var(--accent-crime); border: 1px solid var(--accent-crime-border); }
  .badge-hacktivist { background: var(--accent-hack-bg); color: var(--accent-hack); border: 1px solid var(--accent-hack-border); }

  .card-nation {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 7px;
    letter-spacing: .03em;
  }

  .card-targets {
    font-size: 11px;
    color: var(--text3);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Detail panel (slide-over) ── */
  .panel-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 50;
  }

  .panel-overlay.open { display: block; }

  .detail-panel {
    position: fixed;
    top: 0; right: 0;
    width: 520px;
    max-width: 95vw;
    height: 100vh;
    background: var(--bg2);
    border-left: 1px solid var(--border2);
    z-index: 51;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }

  .detail-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  .panel-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .panel-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -.01em;
    line-height: 1.25;
  }

  .close-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 9px;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    transition: all .15s;
  }

  .close-btn:hover { border-color: var(--border2); color: var(--text); }

  .panel-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .meta-pill {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 3px;
  }

  /* ── Panel tabs ── */
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg2);
  }

  .tab-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 10px 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all .15s;
    margin-bottom: -1px;
  }

  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent-blue); }

  /* ── Panel body ── */
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px;
  }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── Sections ── */
  .section { margin-bottom: 22px; }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .overview-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
  }

  /* ── Objectives grid ── */
  .obj-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .obj-item {
    font-size: 12px;
    color: var(--text2);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    display: flex;
    align-items: flex-start;
    gap: 7px;
    line-height: 1.4;
  }

  .obj-icon { font-size: 13px; color: var(--text3); flex-shrink: 0; margin-top: 1px; }

  /* ── TTP items ── */
  .ttp-list { display: flex; flex-direction: column; gap: 5px; }

  .ttp-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
  }

  .mitre-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent-blue);
    background: var(--accent-blue-bg);
    border: 1px solid var(--accent-blue-border);
    padding: 1px 6px;
    border-radius: 3px;
    flex-shrink: 0;
    white-space: nowrap;
    margin-top: 1px;
  }

  /* ── Pill lists ── */
  .pill-list { display: flex; flex-wrap: wrap; gap: 6px; }

  .pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text2);
    background: var(--bg3);
    font-family: var(--mono);
    letter-spacing: .02em;
  }

  .pill-malware { border-color: var(--accent-apt-border); color: var(--accent-apt); background: var(--accent-apt-bg); }
  .pill-target { border-color: var(--accent-crime-border); color: var(--accent-crime); background: var(--accent-crime-bg); }
  .pill-alias { border-color: var(--accent-blue-border); color: var(--accent-blue); background: var(--accent-blue-bg); }
  .pill-tactic { border-color: rgba(168,85,247,.25); color: #a855f7; background: rgba(168,85,247,.08); }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }

  .empty-state p { font-family: var(--mono); font-size: 12px; }
</style>
</head>
<body>

<div class="app">

<!-- Topbar -->
<div class="topbar">
  
  <div class="logo">
    <div class="logo-dot"></div>
    ThreatBase
  </div>

  <div class="topbar-title">
    Global Threat Intelligence Platform
  </div>

  <div class="topbar-right">

    <span class="live-wrapper">
      <span class="live-dot"></span>
      <span class="live-text">LIVE</span>
    </span>

    <span class="analyst-tag">
      Dalton Hunter
    </span>

    <span class="total-badge" id="total-badge">
      46 actors
    </span>

  </div>

</div>

  <!-- Controls -->
  <div class="controls">
    <div class="filter-group">
      <button class="filter-btn active-all" onclick="setFilter('all',this)">
        All <span class="count-chip" id="cnt-all">46</span>
      </button>
      <button class="filter-btn" onclick="setFilter('APT',this)">
        APT <span class="count-chip" id="cnt-apt"></span>
      </button>
      <button class="filter-btn" onclick="setFilter('Cybercrime',this)">
        Cybercrime <span class="count-chip" id="cnt-crime"></span>
      </button>
      <button class="filter-btn" onclick="setFilter('Hacktivist',this)">
        Hacktivist <span class="count-chip" id="cnt-hack"></span>
      </button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search by name, nation, alias…" oninput="renderGrid()">
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="grid-area">
      <div class="actor-grid" id="actor-grid"></div>
    </div>
  </div>

</div>

<!-- Overlay -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>

<!-- Detail panel -->
<div class="detail-panel" id="detail-panel">
  <div class="panel-header">
    <div class="panel-header-top">
      <div class="panel-name" id="panel-name">—</div>
      <button class="close-btn" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-meta" id="panel-meta"></div>
  </div>
  <div class="panel-tabs">
    <button class="tab-btn active" onclick="switchTab('overview',this)">Overview</button>
    <button class="tab-btn" onclick="switchTab('ttps',this)">TTPs</button>
    <button class="tab-btn" onclick="switchTab('malware',this)">Malware</button>
    <button class="tab-btn" onclick="switchTab('targeting',this)">Targeting</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script>
const actors = [
  {name:"Lazarus Group",type:"APT",nation:"North Korea",mitre_group_id:"G0032",aliases:["HIDDEN COBRA","Guardians of Peace","Zinc","Diamond Sleet"],targets:["Financial institutions","Cryptocurrency exchanges","Defense contractors","Media organizations"],known_malware:["WannaCry","Destover","AppleJeus","BLINDINGCAN"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Credential Access","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1566 – Spearphishing (weaponized Office docs)","T1059 – Command and Scripting Interpreter (PowerShell, Python)","T1547 – Boot/Logon Autostart Execution","T1027 – Obfuscated Files or Information","T1021 – Remote Services (RDP, SMB)","T1195 – Supply Chain Compromise","T1486 – Data Encrypted for Impact (WannaCry)","T1041 – Exfiltration Over C2 Channel"],description:"State-sponsored threat group associated with North Korea's Reconnaissance General Bureau (RGB). Active since at least 2009, responsible for the 2014 Sony Pictures breach, the 2016 Bangladesh Bank SWIFT heist ($81M stolen), and the 2017 WannaCry ransomware outbreak affecting 150+ countries. Uniquely multi-mission, blending espionage, financial theft, and destructive malware. Has stolen an estimated $3B+ in cryptocurrency since 2017 to fund the North Korean regime.",objectives:["Financial theft","Cyber espionage","Destructive operations","Cryptocurrency theft","Intelligence collection"]},
  {name:"APT29 (Cozy Bear)",type:"APT",nation:"Russia",mitre_group_id:"G0016",aliases:["Cozy Bear","The Dukes","Midnight Blizzard","Nobelium"],targets:["Government agencies","NATO allies","Think tanks","Political organizations","Vaccine researchers"],known_malware:["MiniDuke","CosmicDuke","WellMess","SUNBURST"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Credential Access","Collection","Command and Control","Exfiltration"],mitre_techniques:["T1195.002 – Compromise Software Supply Chain (SolarWinds)","T1078 – Valid Accounts","T1550.001 – Pass-the-Hash","T1070 – Indicator Removal on Host","T1567 – Exfiltration Over Web Service (OneDrive, Dropbox)","T1558 – Steal or Forge Kerberos Tickets","T1098 – Account Manipulation","T1071.001 – HTTPS-based C2"],description:"Russian Foreign Intelligence Service (SVR) threat actor, among the most technically sophisticated adversaries ever documented. Responsible for the 2016 DNC breach, the 2020 SolarWinds Orion supply chain compromise affecting 18,000+ organizations, and campaigns targeting COVID-19 vaccine researchers. Favors custom tooling, living-off-the-land techniques, and mimics legitimate cloud services for C2 to evade detection. Known for extremely long dwell times inside victim networks.",objectives:["Cyber espionage","Intelligence collection","Credential harvesting","Supply chain compromise","Long-term persistent access"]},
  {name:"APT28 (Fancy Bear)",type:"APT",nation:"Russia",mitre_group_id:"G0007",aliases:["Fancy Bear","Sofacy","Pawn Storm","Forest Blizzard","Strontium"],targets:["Political parties","Government ministries","NATO organizations","Anti-doping agencies","Media outlets"],known_malware:["X-Agent","Sofacy","LoJax","Zebrocy"],mitre_tactics:["Initial Access","Execution","Privilege Escalation","Defense Evasion","Credential Access","Collection","Exfiltration"],mitre_techniques:["T1566.001 – Spearphishing Attachment","T1203 – Exploitation for Client Execution","T1190 – Exploit Public-Facing Application","T1003 – OS Credential Dumping (Mimikatz)","T1110 – Brute Force","T1113 – Screen Capture","T1114 – Email Collection","T1055 – Process Injection"],description:"Russian GRU Unit 26165, focused on political influence operations combined with traditional espionage. Central to the 2016 US election interference campaign; hacked the DNC and Podesta emails later released via WikiLeaks. Also attacked the German Bundestag, the French 2017 presidential election, and multiple NATO targets. Technically aggressive, frequently using zero-day exploits, and known to pair cyber intrusion with disinformation campaigns.",objectives:["Political influence operations","Cyber espionage","Credential harvesting","Election interference","Intelligence collection"]},
  {name:"Scattered Spider",type:"Cybercrime",nation:"USA / UK",mitre_group_id:"G1015",aliases:["Muddled Libra","UNC3944","Octo Tempest","0ktapus"],targets:["Casinos and hospitality","Telecoms","Technology companies","BPO providers"],known_malware:["BlackCat/ALPHV (ransomware)","Raccoon Stealer"],mitre_tactics:["Initial Access","Persistence","Privilege Escalation","Defense Evasion","Credential Access","Lateral Movement","Impact"],mitre_techniques:["T1078 – Valid Accounts (stolen credentials)","T1621 – MFA Request Generation (MFA fatigue)","T1534 – Internal Spearphishing","T1539 – Steal Web Session Cookie","T1556 – Modify Authentication Process","T1199 – Trusted Relationship abuse","T1486 – Data Encrypted for Impact (ransomware)","T1531 – Account Access Removal"],description:"English-speaking cybercrime group composed largely of young Western actors (US/UK), notable for extremely sophisticated social engineering rather than custom malware. Responsible for the 2023 MGM Resorts and Caesars Entertainment attacks causing hundreds of millions in losses. Skilled at SIM swapping, help-desk impersonation, and MFA fatigue attacks. Demonstrates that advanced attacks do not require nation-state resources.",objectives:["Financial extortion","Ransomware deployment","Credential theft","Social engineering","Data exfiltration"]},
  {name:"APT10",type:"APT",nation:"China",mitre_group_id:"G0045",aliases:["MenuPass","Stone Panda","POTASSIUM","Cicada"],targets:["Managed service providers","Aerospace","Defense","Pharmaceutical","Satellite technology"],known_malware:["PlugX","RedLeaves","QuasarRAT","ChChes"],mitre_tactics:["Initial Access","Persistence","Privilege Escalation","Defense Evasion","Credential Access","Lateral Movement","Collection","Exfiltration"],mitre_techniques:["T1199 – Trusted Relationship (MSP pivot)","T1078 – Valid Accounts","T1059.003 – Windows Command Shell","T1560 – Archive Collected Data","T1071 – Application Layer Protocol","T1105 – Ingress Tool Transfer","T1003 – OS Credential Dumping","T1083 – File and Directory Discovery"],description:"Chinese Ministry of State Security (MSS)-linked group responsible for large-scale intellectual property theft from aerospace, satellite, pharmaceutical, and managed service providers worldwide. Best known for Operation Cloud Hopper (2017), a global campaign that compromised MSPs to pivot to their clients across 12+ countries simultaneously. Two members indicted by the US DOJ in 2018.",objectives:["Intellectual property theft","Cyber espionage","Supply chain compromise","MSP pivot attacks","Intelligence collection"]},
  {name:"APT41",type:"APT",nation:"China",mitre_group_id:"G0096",aliases:["Double Dragon","Winnti Umbrella","Barium","Wicked Panda"],targets:["Healthcare","Telecoms","Technology firms","Video game companies","Government"],known_malware:["Winnti","ShadowPad","MESSAGETAP","Speculoos"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Credential Access","Discovery","Lateral Movement","Collection","Impact"],mitre_techniques:["T1195.002 – Supply Chain Compromise (ShadowHammer)","T1190 – Exploit Public-Facing Application","T1027 – Obfuscated Files or Information","T1078 – Valid Accounts","T1543 – Create or Modify System Process","T1040 – Network Sniffing","T1005 – Data from Local System","T1036 – Masquerading"],description:"Dual-mission Chinese state-sponsored actor conducting both espionage on behalf of Chinese intelligence and financially motivated cybercrime. Uniquely bridges the gap between state operations and profit-driven attacks. Responsible for supply chain compromises (ASUS ShadowHammer, CCleaner), attacks on video game companies to steal virtual currency, and broad targeting of COVID-19 research.",objectives:["Cyber espionage","Financial cybercrime","Supply chain compromise","IP theft","Virtual currency theft"]},
  {name:"Sandworm Team",type:"APT",nation:"Russia",mitre_group_id:"G0034",aliases:["Voodoo Bear","IRON VIKING","TeleBots","Seashell Blizzard"],targets:["Critical infrastructure","Energy sector","Ukrainian government","Olympic organizations"],known_malware:["NotPetya","BlackEnergy","Industroyer","Olympic Destroyer","Cyclops Blink"],mitre_tactics:["Initial Access","Execution","Persistence","Lateral Movement","Collection","Command and Control","Impact"],mitre_techniques:["T1566 – Spearphishing","T1059 – Command and Scripting Interpreter","T1486 – Data Encrypted for Impact","T1485 – Data Destruction","T1489 – Service Stop (ICS/SCADA targeting)","T1195 – Supply Chain Compromise","T1021.002 – SMB/Windows Admin Shares","T1561 – Disk Wipe"],description:"Russian GRU Unit 74455 and the world's most destructive cyber warfare actor. Responsible for the 2015/2016 Ukrainian power grid attacks (first confirmed cyberattacks to cause blackouts), the 2017 NotPetya wiper causing $10B+ in global damage — the most destructive cyberattack in history — and the 2018 Winter Olympics disruption. Operations transcend espionage and constitute acts of digital warfare.",objectives:["Destructive cyber operations","Critical infrastructure attacks","ICS/SCADA disruption","Cyber warfare","Wiper deployment"]},
  {name:"Kimsuky",type:"APT",nation:"North Korea",mitre_group_id:"G0094",aliases:["Velvet Chollima","Black Banshee","Thallium","Emerald Sleet"],targets:["South Korean government","Think tanks","Academics","UN sanctions experts","Journalists"],known_malware:["BabyShark","AppleSeed","PebbleDash","RandomQuery"],mitre_tactics:["Reconnaissance","Initial Access","Execution","Persistence","Collection","Exfiltration"],mitre_techniques:["T1598 – Phishing for Information","T1566.002 – Spearphishing Link","T1059.005 – Visual Basic (VBS scripts)","T1547.001 – Registry Run Keys","T1114.002 – Remote Email Collection","T1056.001 – Keylogging","T1041 – Exfiltration Over C2 Channel","T1204 – User Execution (malicious docs)"],description:"North Korean intelligence collection actor primarily tasked with geopolitical intelligence gathering in support of the Kim regime. Focuses on South Korean think tanks, academic institutions, and international sanctions bodies. Known for extremely convincing spearphishing using stolen identities of real experts and journalists. Active since at least 2012.",objectives:["Geopolitical intelligence collection","Sanctions monitoring","Credential harvesting","Email collection","Keylogging"]},
  {name:"APT33",type:"APT",nation:"Iran",mitre_group_id:"G0064",aliases:["Elfin","Magnallium","Refined Kitten","Peach Sandstorm"],targets:["Aviation","Petrochemical","Energy","Defense contractors","Saudi government"],known_malware:["Shamoon","StoneDrill","SHAPESHIFT","DROPSHOT"],mitre_tactics:["Reconnaissance","Initial Access","Persistence","Defense Evasion","Credential Access","Impact"],mitre_techniques:["T1598.003 – Spearphishing Link (recruitment lures)","T1133 – External Remote Services","T1078 – Valid Accounts","T1110.003 – Password Spraying","T1485 – Data Destruction (Shamoon wiper)","T1561.002 – Disk Structure Wipe","T1546 – Event Triggered Execution","T1071 – Application Layer Protocol"],description:"Iranian cyber espionage and sabotage group linked to the IRGC, targeting aviation, petrochemical, and energy sectors primarily in Saudi Arabia, South Korea, and the United States. Notable for developing Shamoon disk-wiping malware variants. Conducts persistent credential harvesting through fake job recruitment lures and targets industrial control systems.",objectives:["Cyber espionage","Destructive sabotage","ICS targeting","Credential harvesting","Sector-specific IP theft"]},
  {name:"APT34 (OilRig)",type:"APT",nation:"Iran",mitre_group_id:"G0049",aliases:["OilRig","Helix Kitten","Crambus","Hazel Sandstorm"],targets:["Middle Eastern governments","Financial institutions","Telecoms","Energy companies"],known_malware:["POWRUNER","BONDUPDATER","RDAT","Karkoff"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Credential Access","Discovery","Exfiltration","Command and Control"],mitre_techniques:["T1566.001 – Spearphishing Attachment","T1071.004 – DNS Tunneling for C2","T1059.001 – PowerShell","T1078 – Valid Accounts","T1087 – Account Discovery","T1016 – System Network Configuration Discovery","T1048 – Exfiltration Over Alternative Protocol","T1036 – Masquerading"],description:"Iranian Ministry of Intelligence and Security (MOIS)-linked espionage group specializing in long-term persistent access to Middle Eastern governments, financial institutions, and telecoms. Known for creative DNS tunneling C2 channels. Dramatically exposed in 2019 when their tools and victim data were leaked on Telegram by a rival actor.",objectives:["Long-term persistent access","Cyber espionage","Credential theft","DNS tunneling C2","Intelligence collection"]},
  {name:"APT38",type:"APT",nation:"North Korea",mitre_group_id:"G0082",aliases:["Stardust Chollima","NICKEL GLADSTONE"],targets:["Banks","SWIFT payment networks","ATM infrastructure","Financial messaging systems"],known_malware:["DYEPACK","HEROIN","NESTEGG","FastCash ATM malware"],mitre_tactics:["Reconnaissance","Initial Access","Persistence","Defense Evasion","Collection","Exfiltration","Impact"],mitre_techniques:["T1566 – Spearphishing","T1078 – Valid Accounts (SWIFT operator credentials)","T1485 – Data Destruction (evidence wiping post-theft)","T1070 – Indicator Removal on Host","T1560 – Archive Collected Data","T1530 – Data from Cloud Storage","T1491 – Defacement (distraction tactic)","T1657 – Financial Theft"],description:"North Korean financial cybercrime unit with a dedicated mandate to raise hard currency for Pyongyang through bank heists via SWIFT system manipulation. Conducts extensive pre-attack reconnaissance lasting 1–2 years inside bank networks before striking. Responsible for more than $1.3B in attempted theft from financial institutions across 16+ countries.",objectives:["Financial theft","SWIFT system fraud","ATM jackpotting","Evidence destruction","Hard currency generation"]},
  {name:"Equation Group",type:"APT",nation:"USA",mitre_group_id:"G0020",aliases:["Tilded Team","EQGRP"],targets:["Nuclear programs","Telecoms","Military","Government agencies worldwide"],known_malware:["EquationDrug","GrayFish","Fanny","DOUBLEFANTASY","EternalBlue"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Collection","Command and Control"],mitre_techniques:["T1542.002 – Component Firmware (HDD firmware implants)","T1195 – Supply Chain Compromise","T1027 – Obfuscated Files or Information","T1070 – Indicator Removal","T1052 – Exfiltration Over Physical Medium (air-gap bridging)","T1091 – Replication Through Removable Media","T1071 – Application Layer Protocol","T1190 – Exploit Public-Facing Application (EternalBlue)"],description:"Widely attributed to the NSA's Tailored Access Operations (TAO) unit, considered the most technically sophisticated threat actor ever publicly documented. Operated for 14+ years before partial exposure via the Shadow Brokers leak in 2016–2017. Known for firmware-level implants surviving hard drive reformatting and air-gap bridging techniques.",objectives:["Global intelligence collection","Firmware persistence","Air-gap bridging","Zero-day exploitation","Long-term covert access"]},
  {name:"Turla Group",type:"APT",nation:"Russia",mitre_group_id:"G0010",aliases:["Snake","Uroburos","Waterbug","Venomous Bear","Secret Blizzard"],targets:["Ministries of foreign affairs","Military organizations","Embassies","Defense contractors"],known_malware:["Carbon","Uroburos rootkit","ComRAT","Kazuar","HyperStack"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Credential Access","Collection","Command and Control"],mitre_techniques:["T1566 – Spearphishing","T1542 – UEFI Bootkit","T1090.003 – Multi-hop Proxy (satellite link C2)","T1078 – Valid Accounts","T1056 – Input Capture (keylogging)","T1036 – Masquerading","T1070 – Indicator Removal","T1071 – Application Layer Protocol"],description:"Russian FSB-linked espionage group known for exceptional operational security and innovative C2 techniques. Has used compromised satellite internet connections for anonymous C2 and hijacked other threat actors' infrastructure. Active since the late 1990s — one of the longest-running continuously active APT groups. Exclusively targets high-value government ministries, embassies, and military organizations.",objectives:["Diplomatic espionage","Military intelligence collection","Satellite-based C2","Infrastructure hijacking","Long-term covert access"]},
  {name:"Mustang Panda",type:"APT",nation:"China",mitre_group_id:"G0129",aliases:["TA416","RedDelta","Bronze President","Luminous Moth"],targets:["Governments (SE Asia, EU)","NGOs","Religious organizations","Diplomatic missions"],known_malware:["PlugX","Cobalt Strike","ShadowPad","DOPLUGS"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Collection","Command and Control"],mitre_techniques:["T1566.001 – Spearphishing Attachment","T1574.002 – DLL Side-Loading","T1059.003 – Windows Command Shell","T1547.001 – Registry Run Keys","T1005 – Data from Local System","T1071 – Application Layer Protocol","T1036.005 – Match Legitimate Name or Location","T1102 – Web Service C2"],description:"Chinese APT group targeting governments, NGOs, think tanks, and religious minorities, particularly active in Southeast Asia and Europe. Has targeted Vatican communications, Mongolian government systems, and European diplomatic missions. Known for PlugX RAT delivery via fake government documents and a distinctive DLL sideloading technique.",objectives:["Diplomatic intelligence collection","Religious minority targeting","NGO infiltration","Geopolitical intelligence","Persistent access to embassies"]},
  {name:"Charming Kitten",type:"APT",nation:"Iran",mitre_group_id:"G0058",aliases:["APT35","Phosphorus","Mint Sandstorm","TA453","Yellow Garuda"],targets:["Dissidents","Journalists","Academics","Nuclear negotiators","Human rights activists"],known_malware:["POWERSTAR","GorjolEcho","LittleLooter","HYPERSCRAPE"],mitre_tactics:["Reconnaissance","Initial Access","Persistence","Collection","Exfiltration"],mitre_techniques:["T1598 – Phishing for Information (journalist impersonation)","T1566.002 – Spearphishing Link (fake webmail pages)","T1539 – Steal Web Session Cookie","T1114 – Email Collection (HYPERSCRAPE tool)","T1078 – Valid Accounts","T1585 – Establish Accounts (fake personas)","T1056.001 – Keylogging","T1041 – Exfiltration Over C2"],description:"Iranian IRGC-linked cyber espionage group conducting targeted phishing and social engineering against dissidents, journalists, human rights activists, academics, and Western government officials. Known for impersonating journalists from major outlets including BBC and Reuters to build rapport before delivering malware. Has targeted individuals involved in Iran nuclear deal negotiations.",objectives:["Dissident and activist targeting","Credential harvesting","Email account compromise","Journalist impersonation","Nuclear deal intelligence"]},
  {name:"Naikon APT",type:"APT",nation:"China",mitre_group_id:"G0019",aliases:["Override Panda","Lotus Panda","Hellsing"],targets:["SE Asian governments","Military","Foreign ministries","Civil aviation authorities"],known_malware:["Aria-body","XsFunction","PlugX","WinHTTP Backdoor"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Collection","Command and Control","Exfiltration"],mitre_techniques:["T1566 – Spearphishing","T1078 – Valid Accounts","T1027 – Obfuscated Files or Information","T1071.001 – Web Protocols for C2","T1005 – Data from Local System","T1560 – Archive Collected Data","T1070 – Indicator Removal","T1041 – Exfiltration Over C2"],description:"Chinese PLA Unit 78020-linked group specializing in espionage across Southeast Asian nations and entities with South China Sea claims. Targets include foreign ministries, military organizations, and civil aviation authorities across Myanmar, Philippines, Vietnam, Indonesia, and Australia. Has maintained long-term access (5+ years) inside some victim networks.",objectives:["South China Sea intelligence","Military espionage","Foreign ministry infiltration","Long-term network persistence","Regional geopolitical intelligence"]},
  {name:"APT27",type:"APT",nation:"China",mitre_group_id:"G0027",aliases:["Emissary Panda","LuckyMouse","Threat Group-3390","Iron Tiger","Bronze Union"],targets:["Defense contractors","Aerospace","Manufacturing","Technology firms","Government"],known_malware:["HyperBro","SysUpdate","PlugX","ZXShell"],mitre_tactics:["Initial Access","Persistence","Privilege Escalation","Defense Evasion","Collection","Exfiltration"],mitre_techniques:["T1190 – Exploit Public-Facing Application","T1574.002 – DLL Side-Loading","T1059 – Command and Scripting Interpreter","T1078 – Valid Accounts","T1003 – OS Credential Dumping","T1005 – Data from Local System","T1071 – Application Layer Protocol","T1560 – Archive Collected Data"],description:"Chinese cyber espionage group focused on large-scale theft of intellectual property from defense, aerospace, manufacturing, and technology sectors. Known for Operation Iron Tiger targeting US defense contractors. In recent years has pivoted to deploying ransomware as a cover for espionage operations, complicating attribution and victim response.",objectives:["Intellectual property theft","Defense sector espionage","Ransomware-as-cover","Credential dumping","Long-term network access"]},
  {name:"Volt Typhoon",type:"APT",nation:"China",mitre_group_id:"G1017",aliases:["Bronze Silhouette","Vanguard Panda","Dev-0391"],targets:["US critical infrastructure","Electric utilities","Water systems","Military bases (Guam)","Communications"],known_malware:["LOLBins (native OS tools)","FRP proxy tool","Impacket (lateral movement)"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Discovery","Lateral Movement","Command and Control"],mitre_techniques:["T1190 – Exploit Public-Facing Application (VPN/routers)","T1133 – External Remote Services","T1078 – Valid Accounts","T1059.003 – Windows Command Shell (LOLBins only)","T1036 – Masquerading","T1090 – Proxy (SOHO router proxy network)","T1049 – System Network Connections Discovery","T1021.001 – Remote Desktop Protocol"],description:"Chinese state-sponsored actor with a strategic focus on pre-positioning within US critical infrastructure for potential disruptive operations rather than traditional espionage. Distinguished by heavy reliance on living-off-the-land binaries (LOLBins) and routing traffic through compromised SOHO routers. The US IC assesses this as pre-positioning for potential conflict scenarios involving Taiwan.",objectives:["Critical infrastructure pre-positioning","LOLBin-based stealth","SOHO router proxy networks","Conflict-scenario preparation","Long-term covert access"]},
  {name:"Salt Typhoon",type:"APT",nation:"China",mitre_group_id:"G1036",aliases:["Earth Estries","FamousSparrow","GhostEmperor","UNC2286"],targets:["US telecoms (AT&T, Verizon, T-Mobile)","Global telecom providers","Government officials","Lawful intercept systems"],known_malware:["Demodex rootkit","SparrowDoor","FamousSparrow RAT"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Collection","Exfiltration"],mitre_techniques:["T1190 – Exploit Public-Facing Application (telecom edge devices)","T1542.003 – Bootkit (Demodex rootkit)","T1040 – Network Sniffing (CALEA intercept access)","T1078 – Valid Accounts","T1070 – Indicator Removal on Host","T1114 – Email Collection","T1041 – Exfiltration Over C2","T1016 – System Network Configuration Discovery"],description:"Chinese state-linked actor responsible for one of the most significant intelligence breaches in US history — the 2024 compromise of major US telecommunications providers including AT&T, Verizon, and T-Mobile. Successfully accessed lawful intercept (CALEA) systems, enabling collection of call metadata and communications of senior US government officials. Described as the worst telecom hack in US history.",objectives:["Telecom infrastructure compromise","Lawful intercept access","CALEA system exploitation","Government official surveillance","Call metadata collection"]},
  {name:"BlackTech",type:"APT",nation:"China",mitre_group_id:"G0098",aliases:["Circuit Panda","Radio Panda","Palmerworm","HUAPI"],targets:["Technology companies","Defense","Media","Government (Japan, Taiwan, US)"],known_malware:["TSCookie","PLEAD","Flagpro","EVLog"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Lateral Movement","Collection","Command and Control"],mitre_techniques:["T1542.002 – Component Firmware (router firmware modification)","T1566.001 – Spearphishing Attachment","T1574.002 – DLL Side-Loading","T1078 – Valid Accounts","T1021 – Remote Services","T1071 – Application Layer Protocol","T1036 – Masquerading","T1005 – Data from Local System"],description:"Taiwan-focused cyber espionage group with strong links to Chinese intelligence. A 2023 NSA/CISA joint advisory specifically warned about BlackTech's ability to modify router firmware to maintain persistent hidden access inside corporate networks — enabling lateral movement from subsidiary offices to headquarters. Has maintained operations against the same victim organizations for over a decade.",objectives:["Router firmware persistence","Taiwan-focused espionage","Subsidiary-to-HQ lateral movement","Technology IP theft","Long-term covert access"]},
  {name:"LockBit",type:"Cybercrime",nation:"Russia (RaaS/global)",mitre_group_id:"G0139",aliases:["LockBit 3.0","LockBit Black","ABCD ransomware"],targets:["Healthcare","Financial services","Manufacturing","Government","Critical infrastructure"],known_malware:["LockBit 2.0","LockBit 3.0/Black","LockBit Green","StealBit (exfiltration)"],mitre_tactics:["Initial Access","Execution","Persistence","Privilege Escalation","Defense Evasion","Discovery","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1190 – Exploit Public-Facing Application","T1078 – Valid Accounts (RDP brute force)","T1486 – Data Encrypted for Impact","T1489 – Service Stop (disable backups/AV)","T1490 – Inhibit System Recovery (VSS deletion)","T1083 – File and Directory Discovery","T1021.001 – Remote Desktop Protocol","T1074 – Data Staged (StealBit exfiltration)"],description:"The world's most prolific ransomware-as-a-service (RaaS) operation, accounting for more global ransomware incidents than any other group between 2022–2024. Pioneered the affiliate model at scale with a polished admin panel and automated leak site. Victims include Boeing, UK Royal Mail, Ion Trading, and ICBC. Disrupted by Operation Cronos in February 2024 but quickly re-emerged.",objectives:["Ransomware-as-a-service","Double extortion","Affiliate model scaling","Data encryption","Backup destruction"]},
  {name:"Conti Group",type:"Cybercrime",nation:"Russia",mitre_group_id:"G0080",aliases:["Wizard Spider (parent group)","Ryuk successor"],targets:["Healthcare","Government","Financial services","Critical infrastructure"],known_malware:["Conti ransomware","TrickBot","BazarLoader","Cobalt Strike"],mitre_tactics:["Initial Access","Execution","Persistence","Privilege Escalation","Defense Evasion","Discovery","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1566 – Spearphishing (BazarLoader delivery)","T1021.002 – SMB/Admin Shares (lateral movement)","T1003 – OS Credential Dumping","T1484 – Domain Policy Modification (GPO abuse)","T1486 – Data Encrypted for Impact","T1490 – Inhibit System Recovery","T1078 – Valid Accounts","T1562.001 – Disable Security Tools"],description:"One of the most professionally organized ransomware operations ever documented, operating like a legitimate company with HR, training programs, and dedicated teams. Internal communications leaked in 2022 following their support for Russia's Ukraine invasion, revealing a $180M annual revenue operation with 65–100 full-time employees. Conducted the devastating attack on Ireland's HSE healthcare system in 2021.",objectives:["Ransomware deployment","Double extortion","Large enterprise targeting","Healthcare sector attacks","Credential dumping"]},
  {name:"REvil",type:"Cybercrime",nation:"Russia",mitre_group_id:"G0115",aliases:["Sodinokibi","GOLD SOUTHFIELD"],targets:["Food supply chains","Technology vendors","Legal firms","Managed service providers"],known_malware:["REvil/Sodinokibi ransomware","Cobalt Strike"],mitre_tactics:["Initial Access","Execution","Defense Evasion","Discovery","Lateral Movement","Exfiltration","Impact"],mitre_techniques:["T1195.002 – Supply Chain Compromise (Kaseya VSA)","T1078 – Valid Accounts","T1486 – Data Encrypted for Impact","T1490 – Inhibit System Recovery","T1083 – File and Directory Discovery","T1021 – Remote Services","T1071 – Application Layer Protocol","T1074 – Data Staged"],description:"Russian-speaking ransomware syndicate responsible for the $11M JBS Foods attack, the 2021 Kaseya VSA supply chain attack affecting 1,500+ MSP clients, and a 2020 attack on Quanta Computer targeting Apple's supply chain. Pioneered double extortion (encrypt + threaten to publish). Members arrested by Russia's FSB in January 2022.",objectives:["Double extortion","Supply chain ransomware","RaaS operations","Financial extortion","High-profile victim targeting"]},
  {name:"FIN7",type:"Cybercrime",nation:"Ukraine / Russia",mitre_group_id:"G0046",aliases:["Carbon Spider","Navigator Group","ITG14","Sangria Tempest"],targets:["Restaurant chains","Hospitality","Retail POS systems","Financial services"],known_malware:["Carbanak","GRIFFON","BOOSTWRITE","Lizar"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Collection","Exfiltration"],mitre_techniques:["T1566.001 – Spearphishing Attachment (macro docs)","T1059.001 – PowerShell","T1547 – Boot/Logon Autostart Execution","T1056 – Input Capture (POS scraping)","T1113 – Screen Capture","T1571 – Non-Standard Port C2","T1036 – Masquerading","T1041 – Exfiltration Over C2"],description:"Highly professionalized financial cybercrime group that has stolen over $3B from restaurant, hospitality, and retail industries through point-of-sale malware. Created a fake cybersecurity firm (Combi Security) to recruit unwitting penetration testers. Has evolved into an initial access broker role for multiple RaaS gangs including REvil, DarkSide, and BlackCat.",objectives:["POS malware deployment","Financial theft","Initial access brokering","Social engineering","Spearphishing campaigns"]},
  {name:"TA505",type:"Cybercrime",nation:"Russia (suspected)",mitre_group_id:"G0092",aliases:["Hive0065","GRACEFUL SPIDER"],targets:["Financial institutions","Retail","Healthcare","Mass email targets globally"],known_malware:["Dridex","FlawedAmmyy RAT","SDBbot","Locky","Clop ransomware"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Collection","Exfiltration"],mitre_techniques:["T1566.001 – Spearphishing Attachment","T1204.002 – Malicious File (mass phishing)","T1059.001 – PowerShell","T1547.001 – Registry Run Keys","T1027 – Obfuscated Files or Information","T1071 – Application Layer Protocol","T1041 – Exfiltration Over C2","T1105 – Ingress Tool Transfer"],description:"Prolific financially motivated threat actor responsible for some of the largest malware distribution campaigns in history, sending hundreds of millions of malicious emails daily. Primarily distributes banking trojans and ransomware as a service for other criminal groups. Notable for rapidly changing malware delivery methods to evade email defenses and for distributing the Clop ransomware in later campaigns.",objectives:["Mass malware distribution","Banking trojan delivery","RaaS distribution","Email defense evasion","Financial credential theft"]},
  {name:"Evil Corp",type:"Cybercrime",nation:"Russia",mitre_group_id:"G0119",aliases:["Indrik Spider","GOLD DRAKE"],targets:["Corporate networks","Financial services","Healthcare","Media companies"],known_malware:["Dridex","WastedLocker","Hades","Phoenix CryptoLocker","PayloadBin"],mitre_tactics:["Initial Access","Execution","Persistence","Defense Evasion","Discovery","Lateral Movement","Impact"],mitre_techniques:["T1566 – Spearphishing (SocGholish fake browser update)","T1059.001 – PowerShell","T1021.001 – RDP Lateral Movement","T1484 – Domain Policy Modification","T1078 – Valid Accounts","T1486 – Data Encrypted for Impact","T1490 – Inhibit System Recovery","T1036 – Masquerading (rebrand to evade sanctions)"],description:"Russian cybercriminal organization led by Maksim Yakubets, sanctioned by the US Treasury in 2019 with a $5M reward offered. Responsible for the Dridex banking trojan. Has repeatedly rebranded ransomware operations (WastedLocker → Hades → Phoenix CryptoLocker → PayloadBin → Macaw) in direct response to US OFAC sanctions designations. Yakubets is alleged to have direct FSB ties.",objectives:["OFAC sanctions evasion","Ransomware rebranding","Banking trojan deployment","Financial extortion","Corporate network compromise"]},
  {name:"Carbanak Group",type:"Cybercrime",nation:"Ukraine / Russia",mitre_group_id:"G0008",aliases:["Anunak","FIN7 (overlapping)","Carbon Spider"],targets:["Banks","ATM networks","Payment processors","Casinos"],known_malware:["Carbanak malware","Anunak RAT","Cobalt Strike"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Discovery","Collection","Lateral Movement","Impact"],mitre_techniques:["T1566.001 – Spearphishing Attachment","T1113 – Screen Capture (CCTV and operator screen recording)","T1056.001 – Keylogging","T1021 – Remote Services","T1078 – Valid Accounts","T1071 – Application Layer Protocol","T1657 – Financial Theft (ATM jackpotting)","T1070 – Indicator Removal"],description:"Pioneer of APT techniques applied to large-scale financial crime. The Carbanak campaign stole $1B+ from over 100 banks across 40 countries between 2013–2018. Used screen recording and CCTV access to learn cashier workflows, then programmed ATMs to dispense cash on command. Several members arrested in 2018, but their techniques influenced an entire generation of financially motivated actors.",objectives:["ATM jackpotting","Bank heist operations","CCTV workflow surveillance","Financial system manipulation","Large-scale credential theft"]},
  {name:"Dridex Gang",type:"Cybercrime",nation:"Eastern Europe",mitre_group_id:"G0119",aliases:["Bugat Gang","Cridex Gang","Evil Corp (parent)"],targets:["Banking customers","Businesses","Financial institutions"],known_malware:["Dridex","Locky","BitPaymer","Necurs botnet"],mitre_tactics:["Initial Access","Execution","Persistence","Credential Access","Collection","Exfiltration"],mitre_techniques:["T1566.001 – Spearphishing Attachment (macro Word docs)","T1204.002 – Malicious File Execution","T1059.005 – VBScript","T1547.001 – Registry Run Keys","T1056.001 – Keylogging","T1185 – Browser Session Hijacking","T1041 – Exfiltration Over C2","T1497 – Virtualization/Sandbox Evasion"],description:"Banking malware distribution operation centered on the Dridex trojan, which harvests online banking credentials and enables fraudulent transfers. At its peak, Dridex infected millions of computers globally. Leveraged the Necurs botnet to distribute malicious Office documents at massive scale. Europol and the FBI disrupted significant Dridex infrastructure in 2015.",objectives:["Banking credential theft","Mass malware distribution","Browser session hijacking","Financial fraud","Botnet-driven phishing"]},

  {name:"Lizard Squad",type:"Hacktivist",nation:"USA / UK / Finland",mitre_group_id:"N/A",aliases:["Poodle Corp (splinter group)"],targets:["Sony PlayStation Network","Xbox Live","Gaming companies","Airline booking systems"],known_malware:["Lizard Stresser (DDoS tool)","Compromised router botnet"],mitre_tactics:["Impact","Resource Development"],mitre_techniques:["T1498 – Network Denial of Service","T1583.005 – Botnet (compromised router infrastructure)","T1499 – Endpoint Denial of Service","T1491 – Defacement","T1657 – Financial Theft (stresser service revenue)"],description:"Hacktivist and cybercriminal group best known for massive DDoS attacks against major gaming platforms. Brought down PlayStation Network and Xbox Live on Christmas Day 2014, impacting millions of gamers globally. Operated Lizard Stresser, a DDoS-for-hire service built on a botnet of compromised home routers. Several members arrested in 2015.",objectives:["DDoS-for-hire","Gaming platform disruption","Notoriety and attention","Stresser service revenue","Botnet building"]},

  {name:"GhostSec",type:"Hacktivist",nation:"USA (decentralized)",mitre_group_id:"N/A",aliases:["Ghost Security Group"],targets:["ISIS online infrastructure","Israeli systems","Government portals","Industrial control systems (claimed)"],known_malware:["GhostLocker (ransomware, launched 2023)"],mitre_tactics:["Impact","Initial Access","Collection"],mitre_techniques:["T1498 – Network Denial of Service","T1190 – Exploit Public-Facing Application","T1491.002 – External Defacement","T1059 – Command and Scripting Interpreter","T1486 – Data Encrypted for Impact (GhostLocker)"],description:"Hacktivist group originally formed under the Anonymous umbrella in 2015 with a focus on counter-extremism, targeting ISIS/ISIL online infrastructure. Has evolved into a more generalist hacktivist group. Has claimed attacks on ICS/SCADA systems — which, if verified, would represent unusually high hacktivist capability. Launched GhostLocker ransomware in 2023 as a monetization vehicle.",objectives:["Counter-extremism operations","Pro-Palestinian activism","ICS/SCADA disruption (claimed)","Ransomware monetization","Anti-government operations"]},
  {name:"SiegedSec",type:"Hacktivist",nation:"USA",mitre_group_id:"N/A",aliases:["YourAnonWolf (affiliated members)"],targets:["US state governments","NATO portal","Organizations opposing LGBTQ+ rights"],known_malware:["Web shells","Commodity tools"],mitre_tactics:["Initial Access","Collection","Exfiltration","Impact"],mitre_techniques:["T1190 – Exploit Public-Facing Application","T1505.003 – Web Shell","T1213 – Data from Information Repositories","T1530 – Data from Cloud Storage","T1491.002 – External Defacement","T1048 – Exfiltration Over Alternative Protocol"],description:"Politically motivated hacktivist group active since 2022, known for leaking data from US state government agencies in protest of anti-LGBTQ+ legislation. Claimed responsibility for breaching NATO's Communities of Interest Cooperation Portal in 2023, leaking thousands of internal documents. Formally announced dissolution in June 2024.",objectives:["LGBTQ+ rights advocacy","US state government leaks","NATO portal breach","Social justice data leaks","Political statement operations"]},

  {name:"DarkHotel",type:"APT",nation:"South Korea (attributed, disputed)",mitre_group_id:"G0012",aliases:["Tapaoux","Pioneer","Karba","Shadow Walker"],targets:["C-suite executives","Automotive industry","Electronics","Pharmaceutical","Defense contractors"],known_malware:["Tapaoux backdoor","DARKHOTEL RAT","Inexsmar","Ramsay"],mitre_tactics:["Initial Access","Execution","Persistence","Collection","Defense Evasion"],mitre_techniques:["T1566.001 – Spearphishing Attachment","T1608 – Stage Capabilities (hotel network compromise)","T1204.002 – Malicious File (fake software update prompts)","T1547 – Boot/Logon Autostart Execution","T1113 – Screen Capture","T1056.001 – Keylogging","T1027 – Obfuscated Files or Information","T1071 – Application Layer Protocol"],description:"APT group uniquely known for targeting business executives while staying in luxury hotels across Asia. Compromises hotel Wi-Fi or business center systems, then pushes malicious software updates to specific guests identified through hotel reservation systems. Targets C-suite executives in automotive, electronics, pharmaceutical, and manufacturing industries precisely during international business trips.",objectives:["C-suite executive targeting","Hotel network compromise","Travel-based spearphishing","Fake software update delivery","Corporate espionage"]},

  {name:"Comment Crew / APT1",type:"APT",nation:"China",mitre_group_id:"G0006",aliases:["APT1","PLA Unit 61398","Byzantine Candor"],targets:["Aerospace","Energy","Telecoms","IT companies","Defense industrial base"],known_malware:["WEBC2","AURIGA","BANGAT","SEASALT"],mitre_tactics:["Initial Access","Persistence","Defense Evasion","Collection","Exfiltration"],mitre_techniques:["T1566.001 – Spearphishing Attachment","T1059.001 – PowerShell","T1102 – Web Service (comment-based C2 in web pages)","T1078 – Valid Accounts","T1005 – Data from Local System","T1560 – Archive Collected Data","T1048 – Exfiltration Over Alternative Protocol","T1070 – Indicator Removal"],description:"Chinese PLA Unit 61398 — the first nation-state threat actor to be publicly indicted by the United States DOJ in May 2014. Mandiant's landmark 2013 APT1 report exposed the group, identifying them as operating from a 12-story building in Shanghai's Pudong district. Stole terabytes of IP from 141 organizations across 20 industries over 7 years. Named for a distinctive comment-based C2 mechanism embedded in web pages.",objectives:["Terabyte-scale IP theft","Multi-industry espionage","Comment-based C2","Long-term network access","Defense industrial base targeting"]},

  {name:"Silent Librarian",type:"APT",nation:"Iran",mitre_group_id:"G0122",aliases:["TA407","Cobalt Dickens","Mabna Institute"],targets:["Universities (300+ globally)","Research institutes","Government agencies","Private companies"],known_malware:["Custom phishing kits","Credential harvesting pages"],mitre_tactics:["Reconnaissance","Resource Development","Initial Access","Collection","Exfiltration"],mitre_techniques:["T1598.003 – Spearphishing Link (fake university library login pages)","T1585 – Establish Accounts (fake researcher personas)","T1586 – Compromise Accounts","T1114.002 – Remote Email Collection","T1539 – Steal Web Session Cookie","T1056.003 – Web Portal Capture","T1041 – Exfiltration Over C2","T1213 – Data from Information Repositories"],description:"Iranian state-sponsored academic credential theft operation attributed to the Mabna Institute, contracted by the IRGC. Between 2013–2017, stole 31.5TB of academic research from 144 US universities, 176 foreign universities, and government agencies across 22 countries — valued at $3.4B. Operated by creating thousands of spoofed university library login pages. Nine members indicted by the US DOJ in 2018.",objectives:["Academic IP theft","University credential harvesting","Research data exfiltration","IRGC research support","Spoofed library portal phishing"]},

let currentFilter = 'all';
let selectedIdx = null;
let activeTab = 'overview';

function getBadgeClass(type) {
  if (type === 'APT') return 'badge-apt';
  if (type === 'Cybercrime') return 'badge-cybercrime';
  return 'badge-hacktivist';
}

function getCardClass(type) {
  if (type === 'APT') return 'apt';
  if (type === 'Cybercrime') return 'cybercrime';
  return 'hacktivist';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  if (f === 'all') btn.className = 'filter-btn active-all';
  else if (f === 'APT') btn.className = 'filter-btn active-apt';
  else if (f === 'Cybercrime') btn.className = 'filter-btn active-crime';
  else btn.className = 'filter-btn active-hack';
  renderGrid();
}

function updateCounts() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const matches = a => {
    if (!q) return true;
    return a.name.toLowerCase().includes(q) || a.nation.toLowerCase().includes(q) || (a.aliases||[]).some(al => al.toLowerCase().includes(q));
  };
  const all = actors.filter(matches);
  document.getElementById('cnt-all').textContent = all.length;
  document.getElementById('cnt-apt').textContent = actors.filter(a => a.type==='APT' && matches(a)).length;
  document.getElementById('cnt-crime').textContent = actors.filter(a => a.type==='Cybercrime' && matches(a)).length;
  document.getElementById('cnt-hack').textContent = actors.filter(a => a.type==='Hacktivist' && matches(a)).length;
  document.getElementById('total-badge').textContent = all.length + ' actor' + (all.length !== 1 ? 's' : '');
}

function renderGrid() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const grid = document.getElementById('actor-grid');
  const filtered = actors.filter(a => {
    if (currentFilter !== 'all' && a.type !== currentFilter) return false;
    if (q && !a.name.toLowerCase().includes(q) && !a.nation.toLowerCase().includes(q) && !(a.aliases||[]).some(al => al.toLowerCase().includes(q))) return false;
    return true;
  });
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><p>No threat actors match your search.</p></div>';
  } else {
    grid.innerHTML = filtered.map(a => {
      const idx = actors.indexOf(a);
      return `<div class="actor-card ${getCardClass(a.type)} ${selectedIdx===idx?'selected':''}" onclick="openActor(${idx})" tabindex="0" role="button" aria-label="View ${a.name} profile">
        <div class="card-head">
          <div class="card-name">${a.name}</div>
          <span class="type-badge ${getBadgeClass(a.type)}">${a.type}</span>
        </div>
        <div class="card-nation">${a.nation}</div>
        <div class="card-targets">${(a.targets||[]).slice(0,3).join(' · ')}</div>
      </div>`;
    }).join('');
  }
  updateCounts();
}

function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

function openActor(idx) {
  const a = actors[idx];
  selectedIdx = idx;

  document.getElementById('panel-name').textContent = a.name;
  document.getElementById('panel-meta').innerHTML = `
    <span class="type-badge ${getBadgeClass(a.type)}">${a.type}</span>
    <span class="meta-pill">${a.nation}</span>
    ${a.mitre_group_id && a.mitre_group_id !== 'N/A' ? `<span class="meta-pill">MITRE ${a.mitre_group_id}</span>` : ''}
  `;

  // Build tab content
  const objIcons = {'Financial theft':'💰','Crypto':'₿','Espionage':'🔍','Intelligence':'🔭','Credential':'🔑','Ransomware':'🔒','DDoS':'⚡','Supply chain':'🔗','Destructive':'💥','default':'🎯'};
  const getIcon = o => { for (const k in objIcons) { if (o.toLowerCase().includes(k.toLowerCase())) return objIcons[k]; } return objIcons['default']; };

  document.getElementById('panel-body').innerHTML = `
    <div id="tab-overview" class="tab-pane active">
      <div class="section">
        <div class="section-label">Brief</div>
        <p class="overview-text">${a.description}</p>
      </div>
      <div class="section">
        <div class="section-label">Objectives</div>
        <div class="obj-grid">
          ${(a.objectives||[]).map(o=>`<div class="obj-item"><span class="obj-icon">${getIcon(o)}</span>${o}</div>`).join('')}
        </div>
      </div>
      <div class="section">
        <div class="section-label">Aliases</div>
        <div class="pill-list">${(a.aliases||[]).map(al=>`<span class="pill pill-alias">${al}</span>`).join('')}</div>
      </div>
    </div>

    <div id="tab-ttps" class="tab-pane">
      <div class="section">
        <div class="section-label">Tactics</div>
        <div class="pill-list">${(a.mitre_tactics||[]).map(t=>`<span class="pill pill-tactic">${t}</span>`).join('')}</div>
      </div>
      <div class="section">
        <div class="section-label">Techniques</div>
        <div class="ttp-list">
          ${(a.mitre_techniques||[]).map(t => {
            const m = t.match(/^(T\d+[\.\d]*)\s*[–-]\s*(.*)/);
            if (m) return `<div class="ttp-item"><span class="mitre-id">${m[1]}</span><span>${m[2]}</span></div>`;
            return `<div class="ttp-item"><span>${t}</span></div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div id="tab-malware" class="tab-pane">
      <div class="section">
        <div class="section-label">Known malware &amp; tooling</div>
        <div class="pill-list">${(a.known_malware||[]).map(m=>`<span class="pill pill-malware">${m}</span>`).join('')}</div>
      </div>
    </div>

    <div id="tab-targeting" class="tab-pane">
      <div class="section">
        <div class="section-label">Target sectors &amp; regions</div>
        <div class="pill-list">${(a.targets||[]).map(t=>`<span class="pill pill-target">${t}</span>`).join('')}</div>
      </div>
    </div>
  `;

  // Reset to overview tab
  activeTab = 'overview';
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  renderGrid();
}

function closePanel() {
  selectedIdx = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  renderGrid();
}

// Keyboard nav
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

renderGrid();
</script>
</body>
</html>
